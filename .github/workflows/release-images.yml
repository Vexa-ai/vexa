# release-images — build, publish, and PROVE the v0.12 image set (release lane C2/C3).
#
#   tag push v0.12.* (or workflow_dispatch with an explicit version) →
#     preflight       secrets present (fail fast + loud) · tag ↔ package.json ↔ Chart.yaml
#                     appVersion consistency · helm static gates · pinned-render assertions
#     build (matrix)  the 10 uniform images — buildx, amd64, registry :buildcache cache
#     build-bot       vexaai/vexa-bot — special-cased: FROM the locally-built
#                     vexa/meet-join-env:dev base, so it uses the classic docker driver
#     verify          every published manifest resolves + carries linux/amd64
#     validate-*      compose / mock-FSM / bot-spawn / lite / helm-k3s — each leg PULLS the
#                     published :vX.Y.Z images (proves the artifacts, not the local builds)
#     promote         moving tag :v012 on all images once every leg is green (stable tags
#                     only); :latest only via the explicit workflow_dispatch input
#
# Constitutional guard: this workflow NEVER moves vexaai/vexa-bot:dev or vexaai/vexa-bot:latest —
# the 0.10 line publishes there and live 0.10 deployments pull them at spawn time. It also never
# moves any :dev tag (dev = locally-built, by convention across the deploy stacks).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub account with push rights to the vexaai org
#   DOCKERHUB_TOKEN    — a Read & Write access token for that account
# Missing secrets fail in preflight with a pointed message; no build job starts.
# Docker Hub repos auto-created on first push (e.g. vexaai/v012-mcp) must be PUBLIC —
# the validation legs and end users pull anonymously.
name: release-images

on:
  push:
    tags: ["v0.12.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build + publish (vX.Y.Z[-suffix], e.g. v0.12.0-rc.1). Base version must match Chart.yaml appVersion + package.json."
        required: true
        type: string
      promote_latest:
        description: "Also move :latest (never automatic; never vexa-bot; stable versions only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-images-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Every image this release publishes. v012-mcp is not in the helm chart but IS a compose
  # service — the pull-only compose leg (and users) need it published like the rest.
  ALL_IMAGES: >-
    vexaai/v012-admin-api
    vexaai/v012-runtime
    vexaai/v012-agent-worker
    vexaai/v012-agent-api
    vexaai/v012-meeting-api
    vexaai/v012-gateway
    vexaai/v012-mcp
    vexaai/v012-terminal
    vexaai/vexa-dashboard
    vexaai/vexa-bot
    vexaai/vexa-lite

jobs:
  # ──────────────────────────────────────────────────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Docker Hub credentials present?
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error title=Docker Hub secrets missing::release-images cannot publish. Create repository secrets DOCKERHUB_USERNAME (an account with push rights to the vexaai org) and DOCKERHUB_TOKEN (a Read & Write access token) under Settings → Secrets and variables → Actions, then re-run. Failing fast before any build starts."
            exit 1
          fi
          echo "✓ Docker Hub credentials configured"

      - uses: actions/checkout@v4

      - name: Resolve + cross-check the release version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_INPUT:-$GITHUB_REF_NAME}"
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]] \
            || { echo "::error ::'$VERSION' is not a release version (want vX.Y.Z[-suffix])"; exit 1; }
          BARE="${VERSION#v}"          # 0.12.0-rc.1
          BASE="${BARE%%-*}"           # 0.12.0
          PKG="$(node -p "require('./package.json').version")"
          APPV="$(awk -F'"' '/^appVersion:/ {print $2}' deploy/helm/charts/vexa/Chart.yaml)"
          [ "$BASE" = "$PKG" ]  || { echo "::error ::tag $VERSION vs package.json version $PKG — bump one of them"; exit 1; }
          [ "$BASE" = "$APPV" ] || { echo "::error ::tag $VERSION vs Chart.yaml appVersion $APPV — bump one of them"; exit 1; }
          if [ "$BARE" != "$BASE" ]; then PRE=true; else PRE=false; fi
          { echo "version=$VERSION"; echo "prerelease=$PRE"; } >> "$GITHUB_OUTPUT"
          echo "✓ releasing $VERSION (prerelease=$PRE; package.json=$PKG, appVersion=$APPV)"

      - name: Helm static gates (lint + template assertions)
        run: |
          bash deploy/helm/tests/test_helm_lint.sh
          bash deploy/helm/tests/test_template.sh

      - name: Pinned render — every image ref follows global.imageTag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          RENDER="$(helm template vexa deploy/helm/charts/vexa -n vexa \
            -f deploy/helm/charts/vexa/values-test.yaml --set global.imageTag="$VERSION")"
          N="$(grep -cE "image: \"vexaai/v012-[a-z-]+:$VERSION\"" <<<"$RENDER" || true)"
          [ "$N" -ge 6 ] || { echo "::error ::expected >=6 v012 component images pinned to $VERSION, got $N"; exit 1; }
          grep -q "vexaai/vexa-bot:$VERSION" <<<"$RENDER" \
            || { echo "::error ::bot image (runtime BROWSER_IMAGE) does not follow global.imageTag"; exit 1; }
          grep -q "vexaai/v012-agent-worker:$VERSION" <<<"$RENDER" \
            || { echo "::error ::agent-worker image does not follow global.imageTag"; exit 1; }
          if grep -nE 'vexaai/[a-z0-9-]+:dev' <<<"$RENDER"; then
            echo "::error ::pinned render still references :dev images"; exit 1
          fi
          echo "✓ pinned render: $N component refs + bot + agent-worker at $VERSION, zero :dev"

  # ──────────────────────────────────────────────────────────────────────────────────────────
  build:
    name: "build ${{ matrix.name }}"
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin-api
            image: vexaai/v012-admin-api
            context: core/identity/services/admin-api
            dockerfile: core/identity/services/admin-api/Dockerfile
          - name: runtime
            image: vexaai/v012-runtime
            context: core/runtime
            dockerfile: core/runtime/Dockerfile
          - name: agent-worker
            image: vexaai/v012-agent-worker
            context: .
            dockerfile: core/agent/worker/Dockerfile
          - name: agent-api
            image: vexaai/v012-agent-api
            context: .
            dockerfile: core/agent/services/agent-api/Dockerfile
          - name: meeting-api
            image: vexaai/v012-meeting-api
            context: .
            dockerfile: core/meetings/services/meeting-api/Dockerfile
          - name: gateway
            image: vexaai/v012-gateway
            context: core/gateway/services/gateway
            dockerfile: core/gateway/services/gateway/Dockerfile
          - name: mcp
            image: vexaai/v012-mcp
            context: core/meetings/services/mcp
            dockerfile: core/meetings/services/mcp/Dockerfile
          - name: terminal
            image: vexaai/v012-terminal
            context: clients/terminal
            dockerfile: clients/terminal/Dockerfile
          - name: dashboard
            image: vexaai/vexa-dashboard
            context: .
            dockerfile: clients/dashboard/Dockerfile
            # parity with deploy/compose/docker-compose.dashboard.yml — the Next proxy's
            # in-cluster gateway SSOT is baked at build time.
            build_args: |
              VEXA_API_URL=http://gateway:8000
          - name: lite
            image: vexaai/vexa-lite
            context: .
            dockerfile: deploy/lite/Dockerfile.lite
            free_disk: true
    steps:
      - uses: actions/checkout@v4
      - name: Free runner disk (large image)
        if: matrix.free_disk == true
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # amd64 only for v0.12.0 — arm64 is a tracked follow-up (build time × QEMU).
          platforms: linux/amd64
          tags: ${{ matrix.image }}:${{ needs.preflight.outputs.version }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  # The bot builds FROM the locally-built vexa/meet-join-env:dev base image, which the buildx
  # docker-container driver cannot see — so this job stays on the classic docker driver
  # (BuildKit via DOCKER_BUILDKIT=1) where local images resolve, and uses inline cache instead
  # of a :buildcache ref.
  build-bot:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Free runner disk (the bot build needs ~10 GB of layers)
        uses: jlumbroso/free-disk-space@v1.3.1
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build the join-env base (vexa/meet-join-env:dev)
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f core/meetings/modules/join/Dockerfile.env \
            -t vexa/meet-join-env:dev \
            core/meetings/modules/join
      - name: Build + push vexaai/vexa-bot
        run: |
          # --cache-from tolerates the ref not existing yet (first release run).
          DOCKER_BUILDKIT=1 docker build \
            -f core/meetings/services/bot/Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "vexaai/vexa-bot:v012" \
            -t "vexaai/vexa-bot:$VERSION" \
            .
          docker push "vexaai/vexa-bot:$VERSION"

  # ──────────────────────────────────────────────────────────────────────────────────────────
  verify-manifests:
    needs: [preflight, build, build-bot]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Every published manifest resolves and carries linux/amd64
        run: |
          set -euo pipefail
          # `imagetools inspect` prints no Platform line for classic-driver (schema-v2)
          # manifests even when the registry descriptor says linux/amd64 — the bot image
          # is built on the classic driver by design, so read the registry descriptor
          # instead; it is authoritative for both manifest shapes.
          for img in $ALL_IMAGES; do
            echo "== $img:$VERSION"
            docker manifest inspect -v "$img:$VERSION" | python3 -c '
          import sys, json
          d = json.load(sys.stdin)
          items = d if isinstance(d, list) else [d]
          plats = {(m.get("Descriptor", {}).get("platform", {}).get("os"),
                    m.get("Descriptor", {}).get("platform", {}).get("architecture"))
                   for m in items}
          sys.exit(0 if ("linux", "amd64") in plats else 1)
          ' || { echo "::error ::$img:$VERSION has no linux/amd64 manifest"; exit 1; }
          done
          echo "✓ all $(wc -w <<<"$ALL_IMAGES") manifests present"

  # ──────────────────────────────────────────────────────────────────────────────────────────
  # Validation legs — every one pulls the PUBLISHED :$VERSION images (COMPOSE_NO_BUILD=1 /
  # helm --set global.imageTag / lite IMAGE_TAG). Green here means the artifacts work, not
  # the working tree.
  validate-compose:
    needs: [preflight, verify-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@v1.3.1
      - uses: astral-sh/setup-uv@v5
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # agent-api reads deploy/compose/.env via env_file (single source of truth) — it must exist.
      - name: Seed compose .env
        run: cp deploy/compose/.env.example deploy/compose/.env
      - name: stack-test (always-on subset) from published images
        working-directory: deploy/compose
        env:
          COMPOSE_NO_BUILD: "1"
          IMAGE_TAG: ${{ needs.preflight.outputs.version }}
          BROWSER_IMAGE: vexaai/vexa-bot:${{ needs.preflight.outputs.version }}
        run: ./bin/stack-test
      - name: Compose state on failure
        if: failure()
        run: |
          docker ps -a
          docker compose -p vexa-compose-gate -f deploy/compose/docker-compose.yml logs --no-color --tail 200 || true

  validate-mock-fsm:
    needs: [preflight, verify-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@v1.3.1
      - uses: astral-sh/setup-uv@v5
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Seed compose .env
        run: cp deploy/compose/.env.example deploy/compose/.env
      - name: Build the mock bot (local instrument image, never published)
        run: docker build -f core/meetings/services/bot/Dockerfile.mock -t mock-bot:dev .
      - name: stack-test + MOCK_BOT scenarios from published images
        working-directory: deploy/compose
        env:
          COMPOSE_NO_BUILD: "1"
          IMAGE_TAG: ${{ needs.preflight.outputs.version }}
          MOCK_BOT: "1"
          BROWSER_IMAGE: mock-bot:dev
        run: ./bin/stack-test
      - name: Compose state on failure
        if: failure()
        run: |
          docker ps -a
          docker compose -p vexa-compose-gate -f deploy/compose/docker-compose.yml logs --no-color --tail 200 || true

  validate-bot-spawn:
    needs: [preflight, verify-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@v1.3.1
      - uses: astral-sh/setup-uv@v5
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Seed compose .env
        run: cp deploy/compose/.env.example deploy/compose/.env
      # The runtime spawns bots through the docker socket API, which does NOT implicit-pull —
      # the published bot image must already be on the daemon.
      - name: Pre-pull the published bot image
        run: docker pull "vexaai/vexa-bot:$VERSION"
      - name: stack-test + real bot spawn (COMPOSE_BOT=1) from published images
        working-directory: deploy/compose
        env:
          COMPOSE_NO_BUILD: "1"
          IMAGE_TAG: ${{ needs.preflight.outputs.version }}
          COMPOSE_BOT: "1"
          BROWSER_IMAGE: vexaai/vexa-bot:${{ needs.preflight.outputs.version }}
        run: ./bin/stack-test
      - name: Compose state on failure
        if: failure()
        run: |
          docker ps -a
          docker compose -p vexa-compose-gate -f deploy/compose/docker-compose.yml logs --no-color --tail 200 || true

  validate-lite:
    needs: [preflight, verify-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@v1.3.1
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Point lite at the published image
        run: |
          printf 'ADMIN_TOKEN=ci-admin-token\nTRANSCRIPTION_SERVICE_URL=\nTRANSCRIPTION_SERVICE_TOKEN=\nIMAGE_TAG=%s\n' "$VERSION" > .env
      - name: Bring lite up (pulls vexaai/vexa-lite:$VERSION)
        run: make -C deploy/lite up init-db
      - name: Probe the front doors (make test exits non-zero on failure)
        run: |
          for i in $(seq 1 10); do
            make -C deploy/lite test && exit 0
            echo "…front doors not all up yet (attempt $i/10)"; sleep 15
          done
          echo "::error ::lite front-door probes failed after 10 attempts"
          exit 1
      - name: Lite state on failure
        if: failure()
        run: |
          docker ps -a
          docker logs vexa-lite --tail 300 || true

  validate-helm-k3s:
    needs: [preflight, verify-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: jlumbroso/free-disk-space@v1.3.1
      # k3s' containerd pulls anonymously by default — authenticate to dodge Docker Hub's
      # per-IP anonymous rate limit (shared across GitHub runners).
      - name: Registry auth for k3s
        run: |
          sudo mkdir -p /etc/rancher/k3s
          sudo tee /etc/rancher/k3s/registries.yaml >/dev/null <<EOF
          configs:
            registry-1.docker.io:
              auth:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
          EOF
      - name: Install k3s (ephemeral single node)
        run: |
          curl -sfL https://get.k3s.io | sudo sh -s - --write-kubeconfig-mode 644
          # kubectl errors out (rather than waiting) while the API server is still booting —
          # poll until it answers, then wait for node readiness.
          for i in $(seq 1 60); do kubectl get nodes >/dev/null 2>&1 && break; sleep 5; done
          kubectl wait --for=condition=Ready node --all --timeout=300s
      - name: helm install from published images
        run: |
          helm upgrade --install vexa deploy/helm/charts/vexa -n vexa --create-namespace \
            -f deploy/helm/charts/vexa/values-test.yaml \
            --set global.imageTag="$VERSION" \
            --wait --timeout 20m
      - name: Gateway /health + pod states
        run: |
          set -euo pipefail
          curl -sf --retry 10 --retry-delay 5 --retry-all-errors http://127.0.0.1:30056/health
          echo
          BAD="$(kubectl -n vexa get pods --no-headers | awk '$3 !~ /Running|Completed|Succeeded/')"
          if [ -n "$BAD" ]; then
            echo "$BAD"
            echo "::error ::non-Running pods after helm --wait"
            exit 1
          fi
          echo "✓ gateway healthy, all pods Running"
      - name: Cluster state on failure
        if: failure()
        run: |
          kubectl -n vexa get pods -o wide || true
          kubectl -n vexa get events --sort-by=.lastTimestamp | tail -50 || true
          kubectl -n vexa describe pods | tail -150 || true

  # ──────────────────────────────────────────────────────────────────────────────────────────
  promote:
    name: promote moving tag
    needs:
      - preflight
      - verify-manifests
      - validate-compose
      - validate-mock-fsm
      - validate-bot-spawn
      - validate-lite
      - validate-helm-k3s
    # Stable releases only — an rc rehearsal must never move what users pull.
    if: needs.preflight.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      PROMOTE_LATEST: ${{ inputs.promote_latest == true }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Promote :v012 (and :latest only when explicitly requested)
        run: |
          set -euo pipefail
          move() {
            local dst="$1:$2" src="$1:$VERSION"
            case "$dst" in
              vexaai/vexa-bot:dev|vexaai/vexa-bot:latest|*:dev)
                echo "::error ::constitutional guard: refusing to move $dst (vexa-bot:{dev,latest} belong to the 0.10 line; :dev is never moved by release CI)"
                exit 1;;
            esac
            echo "→ $dst ⇐ $src"
            docker buildx imagetools create -t "$dst" "$src"
          }
          for img in $ALL_IMAGES; do
            move "$img" v012
          done
          if [ "$PROMOTE_LATEST" = "true" ]; then
            for img in $ALL_IMAGES; do
              if [ "$img" = "vexaai/vexa-bot" ]; then
                echo "· skipping vexaai/vexa-bot:latest (constitutional guard — 0.10 line)"
                continue
              fi
              move "$img" latest
            done
          else
            echo "· :latest untouched (promote_latest not requested)"
          fi
