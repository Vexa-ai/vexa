<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { --bg:#fff; --fg:#252525; --sub:#555; --panel:#f4f4f4; --btn:#fff; --bd:#ddd; }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#252525; --fg:#fbfbfb; --sub:#b5b5b5; --panel:#2f2f2f; --btn:#2f2f2f; --bd:#3a3a3a; }
    }
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 460px; margin: 64px auto; padding: 0 24px; color: var(--fg); background: var(--bg); }
    h1 { font-size: 18px; font-weight: 500; }
    p { line-height: 1.6; color: var(--sub); }
    #status { margin-top: 16px; font-size: 14px; padding: 12px 14px; border-radius: 10px; background: var(--panel); }
    .ok { color: #1d9e75; } .err { color: #ff6467; }
    button { margin-top: 16px; padding: 9px 16px; font-size: 14px; border: 0.5px solid var(--bd); border-radius: 10px; background: var(--btn); color: var(--fg); cursor: pointer; }
  </style>
</head>
<body>
  <h1>Enable microphone for Vexa voice notes</h1>
  <p>Vexa needs microphone access to transcribe voice notes. Click the button and choose <b>Allow</b> when Chrome asks.</p>
  <button id="grant">Enable microphone</button>
  <div id="status">Not requested yet.</div>
  <script src="mic-permission.js"></script>
</body>
</html>
