services:
  transcription-dev:
    image: nginx:alpine
    container_name: vexa-dev-transcription-lb
    ports:
      - "127.0.0.1:${DEV_TRANSCRIPTION_HOST_PORT:-18083}:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transcription-dev-worker-1
    restart: unless-stopped
    networks:
      transcription-dev-net:
      vexa-compose-net:
        aliases:
          - transcription-dev
      vexa-lite-net:
        aliases:
          - transcription-dev

  transcription-dev-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: vexa-dev-transcription-worker-1
    environment:
      - WORKER_ID=dev-1
      - MODEL_SIZE=${DEV_TRANSCRIPTION_MODEL_SIZE:-base}
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - CPU_THREADS=${DEV_TRANSCRIPTION_CPU_THREADS:-0}
      - API_TOKEN=${DEV_TRANSCRIPTION_SERVICE_TOKEN:-dev-transcription-token}
      - MAX_ACTIVE_REQUESTS=${DEV_TRANSCRIPTION_MAX_ACTIVE_REQUESTS:-2}
      - REALTIME_RESERVED_SLOTS=${DEV_TRANSCRIPTION_REALTIME_RESERVED_SLOTS:-1}
      - FAIL_FAST_WHEN_BUSY=${DEV_TRANSCRIPTION_FAIL_FAST_WHEN_BUSY:-true}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - transcription-dev-net

networks:
  transcription-dev-net:
    driver: bridge
  vexa-compose-net:
    external: true
    name: vexa_vexa
  vexa-lite-net:
    external: true
    name: vexa-lite-net
