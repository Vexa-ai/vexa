events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

    upstream transcription_workers {
        least_conn;
        server transcription-dev-worker-1:8000 max_fails=1 fail_timeout=10s;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        proxy_read_timeout 300s;
        proxy_connect_timeout 1s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;
        client_body_timeout 300s;

        location / {
            limit_req zone=api_rate_limit burst=100 nodelay;
            limit_req_status 429;
            limit_conn api_conn_limit 50;
            limit_conn_status 503;

            proxy_pass http://transcription_workers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Worker-ID $upstream_addr;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 1;
            proxy_next_upstream_timeout 3s;
        }

        location /health {
            access_log off;
            proxy_pass http://transcription_workers/health;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 1;
            proxy_next_upstream_timeout 1s;
            proxy_connect_timeout 1s;
        }

        location /lb-status {
            access_log off;
            return 200 "Dev transcription load balancer active\n";
            add_header Content-Type text/plain;
        }
    }
}
