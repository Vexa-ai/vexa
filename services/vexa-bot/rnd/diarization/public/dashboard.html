<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vexa diarization RnD — live dashboard</title>
  <style>
    :root {
      --speaker-0: #1f77b4;
      --speaker-1: #ff7f0e;
      --speaker-2: #2ca02c;
      --speaker-3: #d62728;
      --speaker-4: #9467bd;
      --speaker-5: #8c564b;
    }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #fafafa; color: #111; }
    header { background: #fff; border-bottom: 1px solid #ddd; padding: 12px 18px; }
    header h1 { margin: 0; font-size: 17px; font-weight: 600; }
    header .meta-row { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 6px; font-size: 13px; color: #555; }
    header .meta b { color: #111; font-weight: 600; font-family: ui-monospace, monospace; font-size: 12px; }
    header .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    header .pill.ok  { background: #def7ec; color: #03543f; }
    header .pill.err { background: #fde8e8; color: #9b1c1c; }
    main { padding: 12px 18px; max-width: 1200px; margin: 0 auto; }
    .segment { display: grid; grid-template-columns: 110px 90px 1fr 180px; gap: 12px; padding: 6px 10px; border-bottom: 1px solid #eee; align-items: baseline; }
    .segment.pending { background: #fffbe6; }
    .segment .ts { font-family: ui-monospace, monospace; font-size: 12px; color: #888; }
    .segment .chip {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600; color: #fff;
      text-align: center;
    }
    .segment .text { font-size: 15px; line-height: 1.5; }
    .segment .meta { font-family: ui-monospace, monospace; font-size: 11px; color: #999; text-align: right; }
    .placeholder { color: #888; font-style: italic; }
    .session-boundary { padding: 8px 12px; color: #666; font-family: ui-monospace, monospace; font-size: 12px; text-align: center; }
    .empty { color: #888; padding: 32px 12px; text-align: center; }

    /* Metrics panel */
    .metrics {
      position: sticky; top: 0; z-index: 5;
      background: #f5f7fa; border-bottom: 1px solid #ddd;
      padding: 10px 18px;
      font-family: ui-monospace, monospace; font-size: 11px; color: #333;
    }
    .metrics .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 18px;
      max-width: 1200px; margin: 0 auto;
    }
    .metrics .card { background: #fff; border: 1px solid #e2e6eb; border-radius: 4px; padding: 6px 8px; }
    .metrics .card .label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
    .metrics .card .v { font-size: 16px; font-weight: 600; color: #111; font-family: ui-monospace, monospace; }
    .metrics .card .sub { color: #888; font-size: 10px; }
    .metrics .card.warn .v { color: #b45309; }
    .metrics .card.bad .v { color: #b91c1c; }
    .metrics .card.ok .v { color: #047857; }
    .metrics .histo { display: flex; align-items: flex-end; gap: 1px; height: 28px; margin-top: 2px; }
    .metrics .histo .bar { background: #2563eb; min-width: 6px; flex: 1; }
    .metrics .histo .bar.over { background: #dc2626; }
    .metrics .histo-row { display: flex; gap: 0; font-size: 9px; color: #888; margin-top: 1px; }
    .metrics .histo-row span { flex: 1; min-width: 6px; text-align: center; }
    .metrics .row { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; padding-bottom: 6px; }
    .metrics .row .title { font-weight: 600; color: #111; font-size: 12px; }
    .metrics details summary { cursor: pointer; user-select: none; color: #555; padding: 2px 0; }
    .metrics details[open] summary { color: #111; }
  </style>
</head>
<body>
  <header>
    <h1>Vexa diarization MVP0 — bot-native</h1>
    <div class="meta-row">
      <span class="meta">Diarizer: <b id="diarizer-name">(loading)</b></span>
      <span class="meta">Speakers: <b id="num-speakers">?</b></span>
      <span class="meta">Transcription: <span class="pill" id="trx-pill">…</span> <b id="trx-url"></b></span>
      <span class="meta">Session: <b id="session-uid">?</b></span>
      <span class="meta">Meeting: <b id="meeting-id">?</b></span>
      <span class="meta"><a href="/corpus" style="color:#06c">Corpus →</a></span>
    </div>
  </header>
  <section class="metrics" id="metrics-panel">
    <details open>
      <summary><span class="title">Live metrics</span> <span id="metrics-elapsed" style="color:#888"></span></summary>
      <div class="grid" id="metrics-grid"></div>
    </details>
  </section>
  <main>
    <div id="segments"><div class="empty">Waiting for audio. Open <a href="/">/</a> in another tab and share a YouTube tab there.</div></main>
  </main>
  <script src="/static/dashboard.js"></script>
</body>
</html>
