# Full stack for local dev and for building images to push (Docker Hub / GHCR / DOCR).
#
# Build & run locally:
#   docker compose build && docker compose up -d
#
# Push to a registry (set your namespace, then login: docker login / doctl registry login):
#   export DOCKER_IMAGE_PREFIX=docker.io/YOURUSER/vexa-
#   export DOCKER_IMAGE_TAG=dev
#   docker compose build && docker compose push
#
# On DigitalOcean: create a registry, set DOCKER_IMAGE_PREFIX=registry.digitalocean.com/YOUR_REGISTRY/vexa-
# pull on the Droplet: docker compose pull && docker compose up -d
name: vexa_dev
services:
  api-gateway:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-api-gateway:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_HOST_PORT:-8056}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - BOT_MANAGER_URL=http://bot-manager:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://transcription-collector:8000
      - MCP_URL=http://mcp:18888
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_BASE_URL=https://share.dev.vexa.ai
      - TRANSCRIPT_SHARE_TTL_SECONDS=900
      - LOG_LEVEL=DEBUG
    init: true
    depends_on:
      admin-api:
        condition: service_started
      bot-manager:
        condition: service_started
      transcription-collector:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  admin-api:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-admin-api:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    ports:
      - "${ADMIN_API_HOST_PORT:-8057}:8001"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN}
      - LOG_LEVEL=DEBUG
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - vexa_default
    restart: unless-stopped

  bot-manager:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-bot-manager:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/bot-manager/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BOT_IMAGE_NAME=${BOT_IMAGE_NAME:-vexa-bot:dev}
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts-service:8002}
      # Must match this file's top-level `name` + network `vexa_default` → vexa_dev_vexa_default
      - DOCKER_NETWORK=${DOCKER_NETWORK:-vexa_dev_vexa_default}
      - LOG_LEVEL=DEBUG
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - DOCKER_HOST=unix://var/run/docker.sock
      - DEVICE_TYPE=remote
      - WHISPER_LIVE_URL=ws://whisperlive:9090/ws
      - ADMIN_TOKEN=${ADMIN_API_TOKEN}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
      # Storage (recordings)
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-recordings}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_SECURE=${S3_SECURE:-true}
      - LOCAL_STORAGE_DIR=${LOCAL_STORAGE_DIR:-/data/recordings}
      - LOCAL_STORAGE_FSYNC=${LOCAL_STORAGE_FSYNC:-true}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-false}
      - CAPTURE_MODES=${CAPTURE_MODES:-audio}
      # Post-meeting hooks — fires to webapp billing on meeting end
      - POST_MEETING_HOOKS=${POST_MEETING_HOOKS:-}
      # Voice agent / TTS
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${LOCAL_STORAGE_VOLUME_SOURCE:-recordings-data}:/data/recordings
    init: true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      bot-image-prepull:
        condition: service_completed_successfully
    networks:
      - vexa_default
    restart: unless-stopped

  whisperlive:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-whisperlive:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/WhisperLive/Dockerfile.cpu
    volumes:
      - wl-recordings:/var/lib/wl-recordings
    environment:
      - REDIS_STREAM_URL=redis://redis:6379/0/transcription_segments
      - TRANSCRIPTION_COLLECTOR_URL=redis://redis:6379/0/transcription_segments
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_STREAM_NAME=transcription_segments
      - LANGUAGE_DETECTION_SEGMENTS=${LANGUAGE_DETECTION_SEGMENTS}
      - VAD_FILTER_THRESHOLD=${VAD_FILTER_THRESHOLD}
      - MIN_AUDIO_S=${MIN_AUDIO_S:-2.0}
      - MIN_AUDIO_S_TIER2=${MIN_AUDIO_S_TIER2:-20.0}
      - MIN_TIME_BETWEEN_REQUESTS_S=${MIN_TIME_BETWEEN_REQUESTS_S:-0.5}
      - MIN_TIME_BETWEEN_REQUESTS_S_TIER2=${MIN_TIME_BETWEEN_REQUESTS_S_TIER2:-20.0}
      - WL_RECORDING_DIR=${WL_RECORDING_DIR:-/var/lib/wl-recordings}
      - WL_RECORDING_FLUSH_SECONDS=${WL_RECORDING_FLUSH_SECONDS:-3}
      - WL_RECORDING_FSYNC_SECONDS=${WL_RECORDING_FSYNC_SECONDS:-10}
      - WL_RECORDING_ROTATE_SECONDS=${WL_RECORDING_ROTATE_SECONDS:-20}
      - WL_RECORDING_ROTATE_BYTES=${WL_RECORDING_ROTATE_BYTES:-16777216}
      - WL_RECORDING_SNAPSHOT_SECONDS=${WL_RECORDING_SNAPSHOT_SECONDS:-20}
      - WL_RECORDING_UPLOAD_URL=${WL_RECORDING_UPLOAD_URL:-http://bot-manager:8080/internal/recordings/upload}
      - SAME_OUTPUT_THRESHOLD=${SAME_OUTPUT_THRESHOLD:-3}
      - SAME_OUTPUT_THRESHOLD_TIER2=${SAME_OUTPUT_THRESHOLD_TIER2:-2}
      - DEVICE_TYPE=remote
      - REMOTE_TRANSCRIBER_URL=${REMOTE_TRANSCRIBER_URL}
      - REMOTE_TRANSCRIBER_API_KEY=${REMOTE_TRANSCRIBER_API_KEY}
      - REMOTE_TRANSCRIBER_MODEL=${REMOTE_TRANSCRIBER_MODEL:-whisper-1}
      - CONSUL_ENABLE=false
      - WL_REDIS_DISCOVERY_ENABLED=false
    command: >-
      --port 9090
      --backend remote
      --min_audio_s ${MIN_AUDIO_S:-2.0}
      --min_audio_s_tier2 ${MIN_AUDIO_S_TIER2:-20.0}
      --min_time_between_requests_s ${MIN_TIME_BETWEEN_REQUESTS_S:-0.5}
      --min_time_between_requests_s_tier2 ${MIN_TIME_BETWEEN_REQUESTS_S_TIER2:-20.0}
      --wl_recording_dir ${WL_RECORDING_DIR:-/var/lib/wl-recordings}
      --wl_recording_flush_seconds ${WL_RECORDING_FLUSH_SECONDS:-3}
      --wl_recording_fsync_seconds ${WL_RECORDING_FSYNC_SECONDS:-10}
      --wl_recording_rotate_seconds ${WL_RECORDING_ROTATE_SECONDS:-20}
      --wl_recording_rotate_bytes ${WL_RECORDING_ROTATE_BYTES:-16777216}
      --wl_recording_snapshot_seconds ${WL_RECORDING_SNAPSHOT_SECONDS:-20}
      --same_output_threshold ${SAME_OUTPUT_THRESHOLD:-3}
      --same_output_threshold_tier2 ${SAME_OUTPUT_THRESHOLD_TIER2:-2}
    expose:
      - "9090"
      - "9091"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    depends_on:
      transcription-collector:
        condition: service_started
    networks:
      - vexa_default
    restart: unless-stopped

  transcription-collector:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-transcription-collector:${DOCKER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/transcription-collector/Dockerfile
    ports:
      - "${TRANSCRIPTION_COLLECTOR_HOST_PORT:-8123}:8000"
    volumes:
      - ./alembic.ini:/app/alembic.ini
      - ./libs/shared-models/alembic:/app/alembic
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM_NAME=transcription_segments
      - REDIS_CONSUMER_GROUP=collector_group
      - REDIS_STREAM_READ_COUNT=10
      - REDIS_STREAM_BLOCK_MS=2000
      - ADMIN_TOKEN=${ADMIN_API_TOKEN}
      - BACKGROUND_TASK_INTERVAL=10
      - IMMUTABILITY_THRESHOLD=30
      - REDIS_SEGMENT_TTL=3600
      - REDIS_CLEANUP_THRESHOLD=86400
      - LOG_LEVEL=DEBUG
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa-recordings}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_SECURE=${S3_SECURE:-true}
    init: true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - vexa_default
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_HOST_PORT:-5438}:5432"
    networks:
      - vexa_default
    restart: unless-stopped

  db-init:
    image: ${DOCKER_IMAGE_PREFIX:-}vexa-admin-api:${DOCKER_IMAGE_TAG:-latest}
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - LOG_LEVEL=DEBUG
    command: >
      python -c "import asyncio; from shared_models.database import init_db; asyncio.run(init_db())"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa_default
    restart: "no"

  # Ensures BOT_IMAGE_NAME is available in the same daemon/context that
  # bot-manager uses to create meeting bot containers.
  bot-image-prepull:
    image: ${BOT_IMAGE_NAME:-faisalshehzad8/vexa-bot:dev}
    command: >
      sh -c "echo 'bot image pre-pull ok'"
    networks:
      - vexa_default
    restart: "no"

  redis:
    image: redis:7.0-alpine
    command:
      ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    networks:
      - vexa_default
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  recordings-data:
  wl-recordings:

networks:
  vexa_default:
    driver: bridge
