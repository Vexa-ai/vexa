local_human_checklist:
  release: 260508-v0.10.6.1
  generated_at: 2026-05-13T11:45:00Z
  purpose: >
    Human validates only the end-to-end behavior that automation cannot fully
    see: browser UX, real-meeting flow, audible/visible results, and judgment
    that the feature works as expected.
  modes_validated: [lite, compose]

  human_gate_routing:
    purpose: >
      Machine-prepared split for the develop-code bounce path. This does not
      approve or skip any item. It separates the narrow checks that should be
      required for develop-human from edge checks that should either move to
      sampled/risk-accepted validation or be explicitly kept strict by a human.
    required_for_develop_human:
      - lite-dashboard-login-and-meetings
      - compose-dashboard-login-and-meetings
      - compose-real-gmeet-bot-lifecycle
      - compose-recording-playback-full-duration
      - compose-byo-tts-speak-audible
    sampled_or_risk_accepted:
      - compose-recording-finalizing-state
      - compose-voice-agent-camera
      - compose-teams-continue-without-av
      - compose-gmeet-host-not-started-fast-fail
    ai_note: >
      If the release system accepts this split, update the stage/checklist
      validator so required_for_develop_human remains strict while sampled or
      risk-accepted items require an explicit human risk note instead of full
      walkthrough. Until then, the current stage rule still treats all items as
      required.

