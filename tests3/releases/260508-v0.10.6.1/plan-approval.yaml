# ── DoD CHANGES ───────────────────────────────────────────────────────
dod_changes_approved:
  - feature: bot-lifecycle
    change: add-evidence
    id: delete-emits-exit-callback
    to:
      weight: 5
      evidence: {check: RUNTIME_API_DELETE_EMITS_EXIT_CALLBACK, modes: [compose, helm]}
      label: >-
        runtime-api DELETE always emits an exit callback (synthesized
        when no connection_id) so meetings never linger in 'stopping'.
    approved: true

  - feature: recording
    change: add-evidence
    id: master-path-single-writer
    to:
      weight: 5
      evidence: {check: SINGLE_WRITER_FOR_RECORDING_MASTER_PATH, modes: [compose, helm]}
      label: >-
        recording_finalizer is the sole writer for media_files.master_path;
        post_meeting only observes (Pack U.7 race fixed).
    approved: true

  - feature: recording
    change: add-evidence
