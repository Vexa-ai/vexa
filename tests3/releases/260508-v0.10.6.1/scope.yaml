# Release scope — 260508-v0.10.6.1 (revision v2)
#
# Revised 2026-05-12 mid-cycle. Original 18-item omnibus scope (commit
# f5c168e and predecessors) replaced after prod-DB evidence proved the
# recording-storage path was carrying dead relational tables that could
# be cleaned up here safely. Original file preserved in git history;
# this is the authoritative scope going forward.
#
# This is a COMMITMENT artefact (`tests3/communication-standard.md`).
# When signed, the signer attests they have read it multiple times and
# confirm — to the best of their knowledge and effort — that the
# release commits below are what we are doing and why.

# ─────────────────────────────────────────────────────────────────────
# What we commit to
# ─────────────────────────────────────────────────────────────────────
#
# v0.10.6.1 is a fourteen-item release across three concerns:
#
#   1. Ship the eleven items already validated green on compose+lite —
#      community PRs (Swagger, voice-agent camera, Teams modal), OSS
#      adoption (arm64 multi-arch, Apple-Silicon docs), UX (GMeet
#      fast-fail, BYO-TTS playback), the finalizer-master-path
#      single-writer data-integrity fix, and the three hygiene items.
#
#   2. Close the recording-storage architectural debt: drop the dead
#      relational `recordings` + `media_files` tables (one stray row
#      each in prod since Feb 2026); surface playback via a canonical
#      `playback_url` field on the JSONB recording element; delete the
#      dashboard's `pickMasterMediaFile()` selection logic; correct the
#      "legacy inline storage" labelling in code and docs. After this,
#      the JSONB is the single source of truth for recordings.
#
#   3. Add one documentation item: a one-page README at
#      `tests3/lib/migrations/README.md` describing the existing
#      hand-rolled migration convention so the next contributor doesn't
#      re-discover it.
#
# ─────────────────────────────────────────────────────────────────────
# Why now
# ─────────────────────────────────────────────────────────────────────
#
# The eleven retained items were already implemented and validated
# under the prior scope; cutting them now would discard work for no
# gain. The three new architectural items become safe to land this
# release once prod evidence proves the relational layer is abandoned
# (recordings table: 0 idx_scans, 0 inserts since pg_stat tracking
# began; 1 row dated 2026-02-12). Doing the cleanup here is cheaper
# than carrying the schema drift another release.
#
# Test everywhere — lite + compose + helm — this release. ADR-4
# inverted 2026-05-12 (signer's call). See scope.md for the canonical
# human-facing description; this companion mirrors the structured facts.
#
# ─────────────────────────────────────────────────────────────────────
# What I accept the blast radius of
# ─────────────────────────────────────────────────────────────────────
#
# - The eleven retained items have been validated green on compose+lite
#   (`tests3/reports/release-0.10.6-260511-2148.md`). Blast if any
#   regresses: bounded to the specific feature surface of that item.
#
# - Dropping the relational `recordings` + `media_files` tables: two
#   stray rows lost (one user, orphaned since Feb 2026, archived to
#   `archive/2026-05-12-relational-recordings-archive.json` before
#   drop). Zero customer-visible impact predicted by prod evidence.
#   Rollback: companion `m331-restore-relational-recordings.py`
#   recreates empty tables; deleted ORM models restorable from git tag.
#
# - The new `playback_url` field on JSONB recordings: null on a
#   completed recording is an explicit "finalizing" UI state, not a
#   silent fallback. Worst case: UX shows "finalizing" for a recording
#   that's actually ready; user refreshes. No data loss.
#
# - The `media_files` field stays in the public API response one
#   release as deprecated; any external consumer has one cycle to
#   migrate before v0.10.7 removes it.
#
# - Customer-A's /speak fix ships in v0.10.6.1 (was deferred to a phantom
#   v0.10.6.2 in the previous shape; that deferral is rescinded).
#
# ─────────────────────────────────────────────────────────────────────
# What I am NOT doing in this release
# ─────────────────────────────────────────────────────────────────────
#
# - Adoption of alembic or any migration framework (current convention stays)
# - Wiring concurrent multi-bot semantics (v0.10.7 — `bots-per-meeting-add-remove`)
# - Removing `media_files` from the public API response (v0.10.7 — one-release deprecation window)
# - Verified arm64 multi-arch images (v0.10.7 — `arm64-multiarch-validated` good-first-issue)
# - (Previously listed here: first helm rehearsal, backfilling 73 multichunk recordings.
#   ADR-4 inverted 2026-05-12 — both are now IN scope.)
#
# ─────────────────────────────────────────────────────────────────────
# Decisions on file
# ─────────────────────────────────────────────────────────────────────
#
# - DROP the dead relational `recordings` + `media_files` tables in
#   this release. Principle 4 (no DB migrations unless explicitly
#   decided). Prod evidence: idx_scan=0, n_tup_ins=0.
#
# - Null `playback_url` → explicit `finalizing` UI state, NOT a
#   fallback to picking from `media_files`. Principle 5 (fail fast —
#   no fallbacks).
#
# - Test everywhere — lite + compose + helm — this release. Principle 2
#   (blast radius + mitigation): helm IS production; refuse the
#   colour-blind gate. (Inverts the prior "defer to v0.10.6.2" decision.)
#
# - No alembic adoption; keep hand-rolled `m<NNN>` script convention;
#   document via README. Principle 1 (cleanest solution given current
#   state).
#
# Full structured rationale per decision is in the `explicit_decisions:`
# section at the bottom of this file.

