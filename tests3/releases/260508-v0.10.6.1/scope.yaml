  # ── Harness-fix added at develop-code 2026-05-12 (reverse-edge from
  # develop-human after walkability gap surfaced live) ───────────────
  - id: local-stack-walkability-smoke-gate
    source: |
      Harness gap surfaced at v0.10.6.1 develop-human: LOCAL=1
      release-deploy could exit 0 on a stack no human could walk
      (lite with 0 meetings + dummy TRANSCRIPTION_SERVICE_URL;
      compose dashboard auth flow unexercised). The matrix proves all
      returned ok; the first contact for "stack is broken" was the
      human walking the checklist.
    fix: |
      New bash prove tests3/tests/walkability-smoke.sh runs after
      release-deploy LOCAL=1 and before release-validate. Six steps,
      all must pass before develop-human gate opens:
        WALKABILITY_AUTH_ROUND_TRIP_WORKS
        WALKABILITY_MEETINGS_PAGE_HAS_DATA
        WALKABILITY_MEETING_DETAIL_API_LOADS
        WALKABILITY_TRANSCRIPTION_URL_CONFIGURED
        DASHBOARD_CONFIG_NO_STALE_LOCALHOST_DEFAULTS
        DASHBOARD_REWRITES_REQUIRE_BUILD_SSOT
        DASHBOARD_ADMIN_URL_EXPLICIT_SSOT
        DASHBOARD_CLIENT_URLS_FROM_RUNTIME_CONFIG
        TEST_ACCOUNT_BOT_LIMIT_IS_CANONICAL
        TEST_ACCOUNT_NO_STALE_SLOT_CONSUMERS
        WALKABILITY_TTS_SPEAK_ROUND_TRIP
        WALKABILITY_DASHBOARD_LOGIN_RENDERS
      Mode-aware: TRANSCRIPTION reachability check is canonical-stage-only;
      LOCAL=1 inner loop only checks URL is set + non-placeholder. Real
      transcription validation lives at stage substage (canonical infra).
    required_modes: [compose, lite]
    proves:
      - {check: WALKABILITY_AUTH_ROUND_TRIP_WORKS,            modes: [compose, lite]}
      - {check: WALKABILITY_MEETINGS_PAGE_HAS_DATA,           modes: [compose, lite]}
      - {check: WALKABILITY_MEETING_DETAIL_API_LOADS,         modes: [compose, lite]}
      - {check: WALKABILITY_TRANSCRIPTION_URL_CONFIGURED,     modes: [compose, lite]}
      - {check: TRANSCRIPTION_TOKEN_NO_PLACEHOLDER_FALLBACK,  modes: [compose, lite]}
      - {check: DASHBOARD_CONFIG_NO_STALE_LOCALHOST_DEFAULTS, modes: [compose, lite]}
      - {check: DASHBOARD_REWRITES_REQUIRE_BUILD_SSOT,        modes: [compose, lite]}
      - {check: DASHBOARD_ADMIN_URL_EXPLICIT_SSOT,            modes: [compose, lite]}
      - {check: DASHBOARD_CLIENT_URLS_FROM_RUNTIME_CONFIG,    modes: [compose, lite]}
      - {check: TEST_ACCOUNT_BOT_LIMIT_IS_CANONICAL,          modes: [compose, lite]}
      - {check: TEST_ACCOUNT_NO_STALE_SLOT_CONSUMERS,         modes: [compose, lite]}
      - {check: WALKABILITY_TTS_SPEAK_ROUND_TRIP,             modes: [compose, lite]}
      - {check: WALKABILITY_DASHBOARD_LOGIN_RENDERS,          modes: [compose, lite]}
    blast_radius: |
      Closes a harness gap; no customer-visible impact. Worst case if the
      gate itself is wrong: false positives prolong develop-code; false
      negatives let a broken stack through to develop-human (status quo).
    explicit_decisions:
      - "Transcription reachability is canonical-stage-only. LOCAL=1 checks URL non-placeholder and rejects local/dev/example token fallbacks; real reachability is also validated by the transcription roundtrip smoke."
      - "Browser-reachable handoff endpoints are a hard local-human SSOT check. Backend reachability from the Docker host is not enough; every URL emitted to the human browser must come from the canonical handoff surface or from one explicitly configured browser-reachable public endpoint."

  - id: local-human-browser-handoff-endpoints-ssot
    source: |
      Human validation can only sign what the in-app/local browser can
      actually reach. A machine-local URL, Docker-only hostname, or
      storage endpoint that bypasses the dashboard proxy is not acceptable
      evidence for a local human gate, even when backend probes pass.
    fix: |
      Bind the local-human handoff principle to the browser playback
      harness that opens the dashboard route and proves the completed
      recording is playable through the canonical dashboard surface.
    required_modes: [compose]
    proves:
      - test: dashboard-recording-playback-ready
        step: LOCAL_HUMAN_BROWSER_HANDOFF_ENDPOINTS_SSOT
        modes: [compose]
    blast_radius: |
      Scope/proof wiring only. Product behavior is proved by the dashboard
      playback harness; this item prevents the release gate from accepting
      backend-only reachability as human-gate evidence.
    explicit_decisions:
      - "Local human validation URLs must be browser-reachable via the canonical dashboard handoff surface; no internal hostname or ad hoc fallback may satisfy this proof."

  - id: pre-release-security-dependency-floors
    source: |
      GHSA-9wv6-78fw-fq5c was pulled into this release during
      develop-code. Its remaining release blockers were dependency
      advisories in release-built surfaces, not the already-fixed
      hardening classes.
    fix: |
      Raise the dashboard PostCSS dependency floor to a fixed version and
      remove python-multipart from the transcription-service request path.
      The fixed python-multipart version named by the scanner is not
      available from the configured package index, so the release removes
      that parser from the flagged service instead of pinning an
      unbuildable requirement.
    required_modes: [compose, lite, helm]
    proves:
      - test: advisory-dependency-floors
        step: PRE_RELEASE_SECURITY_DEPENDENCY_FLOORS
        modes: [compose, lite, helm]
    blast_radius: |
      Dependency-floor change only. Dashboard lockfile is regenerated by npm;
      transcription-service now uses a bounded standard-library multipart
      parser for the OpenAI-compatible transcription route. Rollback is
      reverting these changes, but doing so reopens the advisory blocker.
    explicit_decisions:
      - "Treat the dependency advisories tracked by GHSA-9wv6-78fw-fq5c as release blockers for v0.10.6.1 and require a machine-visible floor check before human handoff."

