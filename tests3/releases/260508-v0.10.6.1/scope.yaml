# ─────────────────────────────────────────────────────────────────────
# Detailed thesis (the same statement, machine-readable)
# ─────────────────────────────────────────────────────────────────────

thesis: |
  v0.10.6.1 ships the clean, validated subset of the v0.10.6 follow-up
  packs PLUS the architectural cleanup of the recording-storage path
  that prod evidence proves is safe to do now.

  Three intents, in priority order:

  1. Land the v0.10.6 follow-up that's already validated green on
     compose+lite — eleven items, each in scope on architectural merit:
     three correctness fixes (Swagger scheme_name; bot-config silent
     drop of cameraEnabled removed; missing Teams modal handler added),
     two developer-experience wins (arm64 multi-arch images close the
     Rosetta-emulation barrier; vexa-lite docs carry the M-series
     caveat), two reliability wins (GMeet rejection fast-fail under
     30s + waiting-room eviction handled; BYO-TTS playback dispatch
     on Content-Type), one data-integrity fix (finalizer-master-path
     single-writer closes the Pack U.7 second race), and three hygiene
     items (broad-except narrowed, chunk-write log accuracy, five
     backlog issues walked with explicit decisions). Three of the
     correctness fixes originate from OSS contributors — that's a
     flywheel bonus on top of the architectural-merit rationale, not
     the rationale itself.

  2. Close the recordings-storage architectural debt. Drop the dead
     relational `recordings` + `media_files` tables (1 stray row each
     in prod, abandoned since Feb 2026). Surface playback via a
     canonical `playback_url` field on the JSONB recording element —
     replacing dashboard-side `pickMasterMediaFile()` selection logic.
     Remove misleading "legacy inline storage" labelling from code and
     docs. Net effect: one source of truth (JSONB), fail-fast playback
     semantics, principle-3-compliant API contract.

  3. Test everywhere — lite + compose + helm — this release.
     ADR-4 inverted 2026-05-12 on signer's call. Helm IS production;
     deferring helm-bound items would defer customer-A's /speak fix and
     the multichunk backfill (the highest-impact customer pain in the
     pile). Phantom v0.10.6.2 dropped from scope. Six helm-bound items
     pulled back into the release; release timeline grows to ~1 week.
     Multi-bot, media_files removal, schema-drift detection,
     state-machine docs rewrite, scope-md tooling pivot, and verified
     arm64 stay in v0.10.7 packs.

tradeoffs:
  - trade: "Speed vs scope (20 items + helm rehearsal)"
    chosen: "Scope + correctness"
    cost_accepted: "~1 week to release vs ~3-5 days for the smaller cut. First-time canonical helm gate absorbed in this cycle."
  - trade: "Customer-A wait vs do helm now"
    chosen: "Do helm now"
    cost_accepted: "Release timeline grows; in return, customer-A's /speak fix ships in v0.10.6.1 instead of a phantom v0.10.6.2."
  - trade: "Architectural cleanup now vs another release of drift"
    chosen: "Cleanup now"
    cost_accepted: "One DROP TABLE migration this release; three docs touched; bounded by prod evidence."
  - trade: "Hand-rolled migration scripts vs adopting alembic"
    chosen: "Hand-rolled m<NNN> convention"
    cost_accepted: "Schema drift between code model and prod remains possible until v0.10.7 lands drift-detection prove."
  - trade: "Multi-bot capability vs dormant infra"
    chosen: "Dormant for this release"
    cost_accepted: "session_uid plumbing does no disambiguation work; capability named in v0.10.7 packs as bots-per-meeting-add-remove."
  - trade: "scope.md vs scope.yaml authoring this release"
    chosen: "Co-author both, pivot in v0.10.7"
    cost_accepted: "Dual-author cost for this one release; tooling pivot stays its own pack."

architectural_decisions:
  - id: ADR-1
    title: "JSONB is the canonical recording store; drop the relational tables"
    decision: "meetings.data->'recordings' is the sole source of truth; recordings + media_files tables dropped."
    alternatives_rejected:
      - "Complete the relational migration (week+ refactor + 616-meeting data migration to align working store with dead one)"
      - "Leave both stores; document JSONB as canonical (schema drift persists)"
    rationale: "Prod evidence: idx_scan=0, n_tup_ins=0 since pg_stat began. 1 stray row each dated Feb 2026. Removing the dead path costs less than reconciliation."
    consequences:
      - "Five select(Recording) callsites deleted"
      - "Two ORM classes deleted"
      - "m331-drop-relational-recordings.py runs once via Helm migrations Job"
      - "Future contributors learn the codebase has one recording store"

  - id: ADR-2
    title: "Canonical playback_url on the recording, not selection logic on the dashboard"
    decision: "recording_finalizer writes recording.playback_url on JSONB once master assembly succeeds; dashboard reads it; pickMasterMediaFile() deleted."
    alternatives_rejected:
      - "Keep selection logic on dashboard, harden further (codifies leak; bug class recurs)"
      - "Backend SDK helper imported by dashboard (just moves the logic)"
    rationale: "Producer knows master path; consumer should not reason about internal storage layout. Canonical field at API boundary makes dashboard a pure renderer."
    consequences:
      - "Additive optional field on GET /meetings/<id> response"
      - "media_files[] stays one release as deprecated; v0.10.7 removes"
      - "Null playback_url = explicit 'finalizing' UI state, not a fallback"

  - id: ADR-3
    title: "No alembic adoption; document the hand-rolled migration convention"
    decision: "Keep SQLAlchemy create_all (additive) + tests3/lib/migrations/m<NNN>-*.py (destructive). Add README this release."
    alternatives_rejected:
      - "Adopt alembic (frictionless migrations encourage drift; auto-DDL often subtly wrong; tension with principle 4)"
      - "Build custom migration framework (~12 hand-rolled scripts exist; convention works)"
    rationale: "Friction at every destructive change is the feature. Drift class caught by separate v0.10.7 schema-drift-detection prove."
    consequences:
      - "New contributors get one-page README"
      - "v0.10.7 adds drift-detection prove"
      - "Never adopt alembic without revisiting this decision explicitly"

  - id: ADR-4
    title: "Test everywhere — lite + compose + helm — this release. No deferral; no phantom v0.10.6.2."
    decision: |
      All three modes provisioned, deployed, validated in this release.
      Six previously-helm-deferred items pulled back into issues. The
      phantom v0.10.6.2 hotfix release is dropped from scope (it was
      AI-invented, never groomed).
    alternatives_rejected:
      - "Defer helm; lite+compose only (was previous ADR-4 — inverted on signer's call 2026-05-12). Reason for inversion: helm IS production; lite+compose green tells us nothing about helm-bound items. Customer-impact items all sit in the helm-bound bucket; deferring helm = deferring customer relief. Pressure to skip a gate is when the gate is most valuable, not least."
      - "Ship code with helm proves formally deferred (dishonest signal — code without validation isn't shipped)."
    rationale: "Helm IS production. Refuse the colour-blind gate. Pay the timeline cost; ship a release where every claim is verified on production-equivalent infra."
    consequences:
      - "Release timeline grows from ~3-5 days to ~1 week (first-time canonical helm gate absorbed)"
      - "Customer-A /speak fix ships in v0.10.6.1 (not a phantom v0.10.6.2)"
      - "73 multichunk-truncated recordings backfilled in v0.10.6.1"
      - "All v0.10.6.2 references removed from scope"

  - id: ADR-5
    title: "Multi-bot / multi-session capability stays dormant this release"
    decision: "POST /bots continues to mint a new meeting_id per dispatch (1:1). session_uid / MeetingSession infrastructure stays unused."
    alternatives_rejected:
      - "Wire meeting_id reuse + concurrent bots in v0.10.6.1 (needs decisions on transcription dedup, parallel-session UX, webhook semantics, multi-session auth — rushing violates 'clean ASAP' intent)"
    rationale: "Capability is real and useful (retry, bot replacement, redundant capture, hybrid platform, observer bots) but it's a feature, not a cleanup. Feature work belongs in its own plan cycle."
    consequences:
      - "Recorded as v0.10.7 pack bots-per-meeting-add-remove"
      - "Dashboard multi-fragment code stays test-only until v0.10.7"

  - id: ADR-6
    title: "scope.md co-authored with scope.yaml this release; full pivot in v0.10.7"
    decision: "v0.10.6.1 authors both files. scope.md is the human-facing commitment artefact and signed doc; scope.yaml stays as machine input."
    alternatives_rejected:
      - "MD primary now, mid-cycle (re-writing the doc you're about to sign right before the sign is the worst possible timing)"
      - "Stay on YAML; pivot deferred entirely (commitment-artefact voice doesn't fit YAML)"
    rationale: "Bridge release. MD becomes canonical signed artefact one release before tooling catches up."
    consequences:
      - "Dual-authored files this release"
      - "v0.10.7 ships scope_loader.py + stage-contract updates + deprecates YAML companion"

release_level_principle_compliance:
  justification_release_level: |
    Coherent unit because every item is either (a) already validated
    green on compose+lite under the prior scope (11 items — no work
    discarded), or (b) closes recording-storage architectural debt
    that prod evidence proves is safe to land now (3 items). The 7
    helm-bound and env-gap items need rehearsals this release has
    not done.

  blast_radius_aggregate: |
    Worst-case combined exposure if every item regresses simultaneously:
    dashboard playback (mitigated by parallel pickMasterMediaFile during
    deprecation window); 2 stray relational rows lost permanently;
    Apple Silicon Docker pulls fall back to amd64 (mitigated); each
    community-PR feature has feature-bounded blast; hygiene items have
    zero customer-visible blast.
    Aggregate rollback: revert release-merge on main; restore :dev tags
    from prior release; rerun m331-restore-relational-recordings.py.
    Worst-case recovery: ~20 minutes total.

  api_backwards_compatibility: |
    One additive optional field: recordings[i].playback_url on
    GET /meetings/<id>. One field deprecated (recordings[i].media_files[],
    removal in v0.10.7, one-release window). No breaking changes. No
    CLI / env / webhook / registry-check-id changes.

  db_migrations: |
    ONE migration: tests3/lib/migrations/m331-drop-relational-recordings.py.
    Archives 2 stray rows to archive/ before DROP TABLE. Full
    migration-decision in drop-relational-recordings-tables scope item.

  workarounds: |
    None added. One removed:
    pickMasterMediaFile() (the 4-rule preference chain that was the
    workaround for bug #314 — deleted, not refactored).

  fallbacks: |
    None added. Two removed:
    (a) .find() on media_files[] returning chunk-0 (replaced by
    null-playback_url → explicit finalizing UI; fail-fast).
    (b) meetings.py:1978-2000 dead-table fallback (the SELECT-from-recordings-then-fallback
    path; the table is dropped and the SELECT path deleted).

  industry_best_practice: |
    Removed: schema drift (media_files chunk_seq/is_final/finalized_by/chunk_count
    in code model not in prod), misleading "legacy inline storage" comment,
    3 docs describing dead infrastructure as live.
    Introduced: canonical playback_url at API boundary, README documenting
    hand-rolled migration convention.
    Deprecated: recordings[i].media_files[] in public API response (one
    release before removal in v0.10.7).

non_goals:
  - First helm rehearsal of v0.10.6 follow-up packs.
  - Adoption of alembic or any migration framework.
  - Wiring concurrent multi-bot semantics (v0.10.7 territory).
  - Removing `media_files` from the public API response (one-release
    deprecation window — drops in v0.10.7).
  # (Previously: backfilling 73 historical multichunk recordings deferred
  # to v0.10.6.2. ADR-4 inverted 2026-05-12 — backfill now IN scope here
  # as part of `dashboard-multichunk-playback-30s-truncation`.)

# ─────────────────────────────────────────────────────────────────────
# Architectural gaps surfaced this cycle (G1-G9)
# ─────────────────────────────────────────────────────────────────────

architectural_cleanup_summary:
  closes_in_this_release:
    - "G1 — drop dead relational `recordings` + `media_files` tables"
    - "G2 — schema drift between code model and prod (closed by removing dead path)"
    - "G3 — inverted 'legacy inline storage' labelling (code + docs)"
    - "G4 — dashboard-owned selection logic over storage internals (replaced by canonical `playback_url`)"
    - "G6 — silent fallbacks in dead-table query path (`meetings.py:1978-2000` fallback branch)"
    - "G8 — documentation references to dead infrastructure"
    - "G9-partial — migration-convention README added; the convention itself stays (no alembic adoption)"

  recorded_deferred:
    G5_public_api_layout_leak:
      target: v0.10.7
      note: |
        `media_files` array in `GET /meetings/<id>` response deprecated
        in v0.10.6.1 (kept for one release as deprecated field);
        removed when consumers fully migrate to `playback_url`.

    G7_dormant_multi_session_capability:
      target: v0.10.7
      pack: bots-per-meeting-add-remove
      scope: |
        Concurrent + serial multi-bot on the same `meeting_id`. Unlocks
        retry, bot replacement, redundant capture, hybrid-platform,
        observer/monitor bots. Public API: optional `meeting_id` on
        `POST /bots`; per-bot DELETE; `active_sessions[]` on
        `GET /meetings`. Decisions owed at plan-solution: transcription
        dedup policy, parallel-session dashboard UX, lifecycle webhook
        semantics, multi-session authorization model. The schema, the
        `session_uid` plumbing, the dashboard multi-fragment code path
        all already exist — this is a wiring exercise, not new
        infrastructure.

    G9_schema_drift_detection:
      target: v0.10.7
      pack: schema-drift-detection
      scope: |
        Static prove `SCHEMA_MATCHES_MODEL_OR_HAS_MIGRATION` compares
        prod `information_schema.columns` against the code model at
        validate time. Fails the gate if columns exist in model but
        not in DB (or vice versa) without a corresponding migration
        script. No alembic adoption — the hand-rolled `m<NNN>` script
        convention stays. Friction is the feature.

