# v0.10.7 follow-on packs identified mid-cycle (not yet groomed):
v0_10_7_packs_proposed:
  - id: botconfig-capability-split
    ref: "Vexa-ai/vexa#246"
    source: "Mid-cycle 2026-05-12 — promoted from option-B band-aid acceptance on PR #239"
    scope_hint: |
      Split BotConfig into a capability-based model: MeetingRequest +
      BotProfile + BotRuntime + BotSession. Resolves: (1) the 4-store
      precedence chain for recording-enable (req body / User.data /
      env-default / Meeting.data); (2) the cameraEnabled <=> voice_agent_enabled
      entanglement (decouples camera from voice-agent intent); (3) the
      three-name inconsistency (recording_enabled / recording_config.enabled /
      recordingEnabled). Closes sibling open issues #168 #167 #151 #238.

  - id: recording-video-validation-and-dods
    ref: "Vexa-ai/vexa#262"
    source: "Epic depends on #246"
    scope_hint: |
      Once BotConfig is split, the recording-video epic can land: full
      validation matrix + DoDs for video-capture mode. Blocked on #246.

  - id: bots-per-meeting-add-remove
    source: "G7 — dormant multi-session capability"
  - id: media-files-removal-from-public-api
    source: "G5 — public API layout leak (one-release deprecation window)"
  - id: schema-drift-detection
    source: "G9 — formalise hand-rolled migration convention with a validate-time check"
  - id: recordings-storage-prefix-as-separate-field
    source: "G4 follow-up — storage_path reused as chunk-prefix and master-target; should be split"
  - id: configurable-per-user-bot-limits-admin-api
    source: |
      Prod observation 2026-05-12 (user gribov.t.s@gmail.com hit
      max_bot_time_exceeded at 2h on a Google Meet bot). Today's
      max_bot_time is a global default (7200000ms = 2h in
      meetings.py:1062); per-request override exists via the public
      `max_bot_time` field on POST /bots, but there's no
      admin-controlled per-user CEILING. PAYG users need higher
      caps; admins need an API to grant.
    scope_hint: |
      (1) Add per-user limit storage — extend User.data JSONB with
      `limits.max_bot_time_ms` (and any other future limits).
      (2) New admin endpoint(s) — POST/PUT /admin/users/<id>/limits
      to set per-user max_bot_time. Requires admin-api auth.
      (3) Resolution chain in meetings.py:1062 area — per-request
      override > per-user limit > global env default. Single source
      of truth; no scattered if/else mode toggles.
      (4) Document the precedence + the operator-facing API in docs/.
      (5) Add proves:
          - ADMIN_CAN_SET_PER_USER_MAX_BOT_TIME
          - PER_USER_LIMIT_RESPECTED_BY_BOT_DISPATCH
          - PER_REQUEST_OVERRIDE_BOUNDED_BY_USER_LIMIT
      No new fallbacks; if no user limit is set, env default applies
      (existing behaviour, unchanged).

  - id: state-machine-docs-rewrite
    source: "Mid-cycle 2026-05-12 — tests3/README.md sections from §5.5 onwards, the four .claude/skills/ files (0-groom, 1-plan, 7-human, triage), and incidental references in docs/research + features/* are stale relative to the redesigned 13-stage machine. Banner-and-pointer applied in v0.10.6.1; full rewrite deferred to v0.10.7."
    scope_hint: |
      Rewrite tests3/README.md Part 5 to match the new 13-stage flow.
      Rename .claude/skills/ to match new stage numbers (00-idle through
      12-teardown); fold triage into a develop-code skill (since triage
      is now a reverse edge, not a stage); split 7-human into
      04-plan-human / 07-develop-human / 10-stage-human. Update
      docs/research/architecture-validation.md and
      docs/youtube-agent-runtime.md. Audit features/bot-lifecycle/*.md
      and update any references to release-cycle stages.

  - id: arm64-multiarch-validated
    source: "v0.10.6.1 dropped — manifest published for vexa-lite only; runtime never tested on real arm64; reopened as good-first-issue"
    scope_hint: |
      (1) Real arm64 runtime test for vexa-lite end-to-end (recording +
      playback + dashboard) on an Apple Silicon host or Linode arm64 VM.
      (2) Extend the multi-arch CI from vexa-lite to ALL vexaai/* images.
      (3) Add prove `VEXA_LITE_RUNS_NATIVELY_ON_ARM64` (and per-service
      equivalents). (4) Customer-facing docs update with verified support
      matrix.

  - id: scope-md-pivot
    source: "communication-standard Type-2 commitment-artefact upgrade"
    scope_hint: |
      Make scope.md the primary plan-solution output. Add
      tests3/lib/scope_loader.py to parse MD-with-fenced-YAML. Update
