# ─────────────────────────────────────────────────────────────────────
# Explicit decisions
# ─────────────────────────────────────────────────────────────────────

explicit_decisions:
  - decision: "Drop dead relational `recordings` + `media_files` tables in v0.10.6.1."
    rubric_principle: 4 (no DB migrations unless explicitly decided)
    rationale: |
      Prod evidence shows tables are abandoned. Migration is a metadata-
      only DROP. Migration script archives 2 stray rows first; rollback
      is precautionary (no code path depends on tables).
    signed_off_by: dmitry@vexa.ai (2026-05-12)

  - decision: "Null `playback_url` → explicit `finalizing` UI state, not a fallback."
    rubric_principle: 5 (fail fast — no fallbacks)
    rationale: |
      Replacing one silent fallback (`.find()` → chunk-0) with another
      silent fallback (preference-chain) would defeat the cleanup.
      Null = explicit not-ready signal.
    signed_off_by: dmitry@vexa.ai (2026-05-12)

  - decision: "Test everywhere — lite + compose + helm — this release. No deferral; no phantom v0.10.6.2."
    rubric_principle: 2 (blast radius + mitigation)
    rationale: |
      Inverts the previous deferral decision. Helm IS production;
      shipping with only lite + compose validated would be a colour-blind
      gate for the items that matter most to paying customers. The
      previously-named v0.10.6.2 hotfix was AI-invented, never groomed,
      and was being used to justify deferring customer-A's /speak fix
      and the multichunk backfill (the highest-impact customer pain
      items). Pressure to skip a gate is when the gate is most valuable.
      Six helm-bound items pulled back into v0.10.6.1 scope; release
      timeline grows to ~1 week (vs ~3-5 days for the deferred shape).
    signed_off_by: dmitry@vexa.ai (2026-05-12)
    supersedes_prior_decision: |
      "Defer all helm-required items to v0.10.6.2 hotfix" — the prior
      ADR-4 framing. Inverted on signer's call mid-cycle.

  - decision: "No alembic adoption; keep hand-rolled `m<NNN>` script convention; document via README."
    rubric_principle: 1 (cleanest solution given current state)
    rationale: |
      Convention already works. Framework adoption would dilute
      principle-4 friction. v0.10.7 schema-drift-detection prove
      closes the only real gap.
    signed_off_by: dmitry@vexa.ai (2026-05-12)
