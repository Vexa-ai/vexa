  # ─── New (3) ────────────────────────────────────────────────────────

  - id: recordings-playback-url-canonical
    source: design (mid-v0.10.6.1 conversation 2026-05-12)
    problem: |
      Dashboard owns `pickMasterMediaFile()` selection logic walking a
      4-rule preference chain on `media_files[]` because the API leaks
      internal storage layout. Pre-fix (#314), `.find()` returned chunk-0,
      truncating ~73 historical recordings to 30s. The current preference-
      chain fix is symptom-patching; the leaky abstraction remains.
    hypothesis: |
      Surface playback via a single canonical `playback_url` field on
      the JSONB recording element. `recording_finalizer` writes it once
      when master assembly succeeds; dashboard reads it. Null →
      explicit "recording finalizing…" UI (no fallback). Closes G4.
    justification:
      what_problem: |
        Dashboard reasons about internal storage layout; one wrong
        selection rule = silent playback truncation.
      why_this_approach: |
        Canonical field at the API boundary moves the source-of-truth
        into the producer (`recording_finalizer`); dashboard becomes
        a pure renderer.
      alternatives_considered:
        - alt: leave `pickMasterMediaFile()` as-is
          rejected_because: |
            Codifies the leak; bug class recurs every time a new media-
            file flavour gets added (e.g. video chunks).
        - alt: build a backend SDK helper that the dashboard imports
          rejected_because: |
            Backend is Python, dashboard is TS; SDK boundary just moves
            the selection logic, doesn't remove it.
      cleanest_now_because: |
        The JSONB is already where `recording_finalizer` writes; one new
        key is additive and ships in the same finalize call. No new
        infrastructure, no new endpoint.
    blast_radius:
      who_affected: |
        Anyone viewing a recording in the dashboard.
      severity_if_wrong: |
        "Recording finalizing…" appears on a recording that's actually
        ready. UX-only; no data loss, no truncation, no corruption.
        Strictly smaller blast than the current chunk-0 truncation.
      detection_signal: |
        Query: `recordings` JSONB entries where `status='completed'`
        AND `playback_url IS NULL` AND `created_at < now() - interval '5 min'`.
        Alertable in Grafana within ~30s.
      rollback_path: |
        Revert code; the JSONB key is additive (older dashboards just
        won't see it). Restore `pickMasterMediaFile()` from git tag.
      mitigation_if_rollback_slow: |
        Deprecated `media_files` field stays in API response one release;
        any caller can fall back to the old selection logic manually.
    api_compat:
      surfaces_changed:
        - "GET /meetings/<id> response: recordings[i] gains optional `playback_url: string | null`"
        - "media_files[] field marked deprecated; removal in v0.10.7"
      breakages: none
      compat_note: |
        Additive optional field. Existing callers see no change. The
        `media_files` array continues to be present and populated for
        one release.
    migration_decision: none
    code_to_change:
      - file: services/meeting-api/meeting_api/recording_finalizer.py
        function: _finalize_one_media_file_sync / master assembly tail
        change: |
          After successful master upload + JSONB update, set
          `recording["playback_url"] = canonical_master_path` (or
          presigned URL — decision deferred to develop-code).
      - file: services/dashboard/src/app/meetings/[id]/page.tsx
        function: pickMasterMediaFile + audio-player props
        change: |
          Delete `pickMasterMediaFile()`. Replace its callsite with
          `recording.playback_url`. Add null-state UI: "Recording
          finalizing…" when null on a completed recording.
    # v0.10.6.1 develop-code 2026-05-12: scope-matcher (run-matrix.sh) reads
    # `proves:` only; was authored under `tests_to_add:` originally so the
    # checks never made it into the compose matrix scope. Renamed to match
    # the standard scope-item shape.
    proves:
      - {check: RECORDING_HAS_PLAYBACK_URL_AFTER_FINALIZE, modes: [compose]}
      - {check: DASHBOARD_READS_PLAYBACK_URL_NOT_MEDIA_FILES, modes: [compose]}
      - {check: DASHBOARD_RENDERS_FINALIZING_STATE_ON_NULL_PLAYBACK_URL, modes: [compose]}
    docs_to_update:
      - features/post-meeting-transcription/README.md (canonical playback path)
      - docs/api/meetings-endpoint.md (response shape)
    registry_changes:
      - {add: RECORDING_HAS_PLAYBACK_URL_AFTER_FINALIZE, weight: 10}
      - {add: DASHBOARD_READS_PLAYBACK_URL_NOT_MEDIA_FILES, weight: 10}
      - {add: DASHBOARD_RENDERS_FINALIZING_STATE_ON_NULL_PLAYBACK_URL, weight: 5}
    human_checklist_draft:
      - {mode: compose, do: "Open a completed recording in the dashboard", expect: "Plays from end to end; no `pickMasterMediaFile` call in network/devtools traces"}
      - {mode: compose, do: "Open a recording immediately after meeting end (mid-finalize)", expect: "Shows 'Recording finalizing…' state; updates to playable within ~60s"}
    explicit_decisions:
      - "Null `playback_url` → explicit UI state, NOT a fallback to picking from `media_files`. Principle 5."

  - id: drop-relational-recordings-tables
    source: design (mid-v0.10.6.1 conversation 2026-05-12; prod DB evidence)
    problem: |
      `recordings` + `media_files` tables in prod hold 1 stray row each
      since 2026-02-12. Zero idx_scans, zero inserts in pg_stat history.
      Code model has columns (`chunk_seq`, `is_final`, `finalized_by`,
      `chunk_count`) that prod schema lacks — migration never ran. Every
      `select(Recording)` callsite returns empty in prod. Closes G1, G2.
    hypothesis: |
      Drop both tables. Delete `Recording` + `MediaFile` ORM models.
      Delete 5 `select(Recording)` callsites. JSONB
      `meetings.data->recordings` is the canonical store (616 active
      meetings, written by `recording_finalizer:704`).
    justification:
      what_problem: |
        Dead relational layer carries schema drift; every reader of
        meetings.py:1992 "legacy inline storage" comment is misled.
        New contributors waste time on the wrong store.
      why_this_approach: |
        Drop the dead path entirely rather than completing the migration
        toward it. Prod evidence (0 idx_scans) proves nothing depends
        on the relational layer.
      alternatives_considered:
        - alt: complete the relational migration (move JSONB writers to tables, drop JSONB key)
          rejected_because: |
            Week+ of refactor + data migration for 616 meetings; killing
            the working store to align with the dead one. Cost/benefit
            inverted.
        - alt: leave both stores; document JSONB is canonical
          rejected_because: |
            Schema drift stays; every audit cycle re-discovers the same
            confusion. Principle 1 violation (cleanest solution given
            current state).
      cleanest_now_because: |
        Prod evidence proves the path is dead; removal is principle-4
        compliant (explicit migration_decision with full block); rollback
        is trivial (empty tables); blast radius is provably ~zero.
    blast_radius:
      who_affected: |
        Zero customer-visible impact. Two stray rows lost (one user,
        already orphaned from current code paths since Feb 2026).
      severity_if_wrong: |
        Endpoint that still selects from tables would return empty —
        but it already does in prod. Strictly no behavioural change.
      detection_signal: |
        Grep gate `RECORDINGS_TABLE_NOT_REFERENCED` fails at validate
        time if any `Recording`/`MediaFile` reference survives outside
        archived legacy paths.
      rollback_path: |
        Run companion `m331-restore-relational-recordings.py` (creates
        empty tables matching the dropped schema). Restore deleted
        ORM models from git tag. The 2 stray rows are archived to
        `archive/2026-05-12-relational-recordings-archive.json` before
        drop — restorable but not auto-restored on rollback.
      mitigation_if_rollback_slow: |
        Zero — no caller depends on the tables; rollback is precautionary.
    api_compat:
      surfaces_changed: []
      breakages: none
      compat_note: |
        Public `GET /meetings/<id>` reads JSONB exclusively
        (`collector/endpoints.py:347`); response shape unchanged.
    migration_decision:
      tool: hand-rolled python script under tests3/lib/migrations/
      script_path: tests3/lib/migrations/m331-drop-relational-recordings.py
      schema_change: |
        DROP TABLE media_files;
        DROP TABLE recordings;
      online: true   # DROP TABLE is metadata-only on PostgreSQL
      rollback: |
        m331-restore-relational-recordings.py runs CREATE TABLE matching
        the pre-drop schema. Two stray rows archived to
        archive/2026-05-12-relational-recordings-archive.json; restore
        is manual if required.
      blast_radius_of_migration_itself: |
        Zero. Two stray rows lost. No row rewrite. No lock escalation.
        No customer-visible impact.
      evidence_of_safety: |
        pg_stat_user_tables 2026-05-12: recordings idx_scan=0,
        n_tup_ins=0; media_files idx_scan=0, n_tup_ins=0; both since
        stats tracking began. 616 of 11,863 meetings actively
        populated via JSONB; 0 rely on the tables.
    code_to_change:
      - file: services/meeting-api/meeting_api/models.py
        change: delete `class Recording` (lines 118-137), delete `class MediaFile` (lines 140+)
      - file: services/meeting-api/meeting_api/recordings.py
        change: delete `select(Recording)` callsites at :201, :522; remove relational INSERT/UPDATE paths in chunk-upload endpoint
      - file: services/meeting-api/meeting_api/recording_finalizer.py
        change: delete `select(Recording)` callsite at :545
      - file: services/meeting-api/meeting_api/meetings.py
        change: "delete `select(Recording)` callsite at :1978; remove `Fallback: check meeting.data[recordings]` comment at :1992"
      - file: services/meeting-api/meeting_api/collector/endpoints.py
        change: delete `select(Recording)` callsite at :77
      - file: tests3/lib/migrations/m331-drop-relational-recordings.py
        change: NEW — archives 2 rows, then DROP TABLE
    # v0.10.6.1 develop-code 2026-05-12: renamed from `tests_to_add` (which
    # run-matrix.sh ignored) to `proves` so the static-grep + runtime checks
    # actually enter the compose matrix. Also made `modes` explicit — there
    # is no `[any]` sentinel in the matcher; it filters by mode-list membership.
    proves:
      - {check: RECORDINGS_TABLE_NOT_REFERENCED, modes: [compose]}   # static grep
      - {check: MEDIA_FILES_TABLE_NOT_REFERENCED, modes: [compose]}  # static grep
      - {check: RECORDINGS_TABLE_DROPPED_IN_PROD, modes: [compose, helm]} # runtime check
    docs_to_update:
      - docs/dependency-audit.md (remove rows 62-63, 210)
      - docs/research/model-split-patterns.md (remove from meeting-domain lists at :10, :388)
      - docs/implementation-plan-v2.md (remove rows :11, :332, :471 and class snippet :394)
      - features/post-meeting-transcription/dods.yaml:32 (annotate historical note "(SQL tables dropped in v0.10.6.1)")
    registry_changes:
      - {add: RECORDINGS_TABLE_NOT_REFERENCED, weight: 10}
      - {add: MEDIA_FILES_TABLE_NOT_REFERENCED, weight: 10}
      - {add: RECORDINGS_TABLE_DROPPED_IN_PROD, weight: 5}
    human_checklist_draft:
      - {mode: compose, do: "After deploy, `SELECT count(*) FROM recordings` against LOCAL=1 stack DB", expect: "errors: relation 'recordings' does not exist"}
      - {mode: compose, do: "Dispatch a bot end-to-end; complete meeting; confirm recording plays back from `playback_url`", expect: "Works without any relational table involvement"}
    explicit_decisions:
      - "Drop > consolidate-toward-relational. Prod evidence proves the tables are abandoned. Principle 1."
      - "Two stray rows archived to JSON, NOT auto-restored on rollback. Manual restore only if needed. Principle 5 — no silent fallback."

  - id: migrations-convention-readme
    source: design (mid-v0.10.6.1 conversation 2026-05-12)
    problem: |
      No alembic. Schema managed via SQLAlchemy `create_all` (additive
      only) + hand-rolled `m<NNN>-*.py` scripts in `tests3/lib/migrations/`
      for destructive changes. Convention is good (forces principle-4
      thinking) but undocumented; every new contributor re-discovers it.
      Closes G9-partial.
    hypothesis: |
      One-page README at `tests3/lib/migrations/README.md` documenting:
      (a) the additive-by-default convention via `create_all`,
      (b) when a hand-rolled migration is required,
      (c) naming convention `m<issue-or-pack-id>-<slug>.py`,
      (d) required content per script (forward, rollback, blast-radius
      declaration), (e) how the Helm `job-migrations.yaml` invokes them.
    justification:
      what_problem: |
        Discoverability — convention exists, no one finds it.
      why_this_approach: |
        Documentation, not new tooling. The convention itself works.
      alternatives_considered:
        - alt: adopt alembic
          rejected_because: |
            Frictionless migrations encourage drift; principle-4
            tension; auto-generated DDL often subtly wrong.
        - alt: build a custom migration framework
          rejected_because: |
            We have ~12 hand-rolled scripts; the convention is fine.
            Don't build infrastructure to solve a documentation problem.
      cleanest_now_because: |
        One file. ~half day. No code path touched. Foundation for the
        v0.10.7 schema-drift-detection prove.
    blast_radius:
      who_affected: contributors reading the codebase
      severity_if_wrong: |
        README is incomplete or wrong → new migrations get authored
        inconsistently; same drift class we just paid down recurs.
      detection_signal: PR review on the README itself
      rollback_path: revert commit
      mitigation_if_rollback_slow: n/a
    api_compat:
      surfaces_changed: []
      breakages: none
    migration_decision: none
    code_to_change:
      - file: tests3/lib/migrations/README.md
        change: NEW — one-page convention doc
    tests_to_add: []
    docs_to_update: []
    registry_changes: []
    human_checklist_draft:
      - {mode: any, do: "Read tests3/lib/migrations/README.md", expect: "Can author a new migration script without re-discovering the convention from source"}
    explicit_decisions: []

