# Per-release contract — tests3/README §3.1. Written by pipeline:0-pack.
# Scope: fix the THREE synthetic-input GMeet join failure modes left after the 2026-06-02 hotfix.
# NOT a full restore — the admission-timeout/rejection cluster is uncaptured here (tracked in #421).
release_id: 260604-meet-join-fix
branch: release/meet-join-fix
summary: |
  Fix the three field-attributed GMeet join failure modes left after the 2026-06-02
  humanized-input hotfix (PR #408): humanized-click miss + localized selectors (407-A),
  join-callback abort (407-B), zero-log startup crash (407-C). Prod DB
  (meetings.data.bot_logs) since 2026-06-02: 312 GMeet meetings, 35 failed
  (~13% vs ~7% 7-day baseline). Three atomic streams (407-A/B/C), reconverged at stitch.
  HONEST SCOPE — this does NOT cover the admission-timeout/host-rejection cluster (the
  dominant failure bucket over 30d: observe gmeet-join-history 2026-06-05 = 219 admission_timeout);
  that is mislabeled (timeout-as-denial) and tracked separately in #421. #412 (audio) also out.

source_signal:
  - {kind: discord,  ref: "levi199821 2026-06-03", note: "Hungarian-UI join fail; 60-min audio overwrite"}
  - {kind: prod_db,  ref: "vexa_readonly @ akamai", note: "35 GMeet failures classified from data.bot_logs, 2026-06-04"}
  - {kind: issues,   ref: [286, 343, 380]}
  - {kind: incident, ref: "PR #408 hotfix (fast-forward to prod)"}

deployments:
  modes: [lite, compose, helm]

issues:
  - id: gmeet-humanized-join-completion
    pack: 407-A
    source: prod_db+discord
    problem: |
      Humanized OS-level XTEST join activates but the join never completes — 17/35 failures.
      Bot reaches the lobby, then is never admitted → idle → manual_leave.
    hypothesis: |
      DISAMBIGUATED from prod bot_logs (2026-06-04, ids below):
      PRIMARY (13) — humanized mouse-replay COORDINATE calibration lands off-target: the bot
        fills the name field and runs the XTEST replay (calibrated offset, N moves) but the
        join click misses the button. ids: 13931 13937 13940 13942 13950 13953 13978 13983
        13984 14007 14046 14173 (+1).
      SECONDARY (4) — English-literal SELECTORS: "Your name" / "Ask to join" located by English
        text/aria-label, so a non-English (Hungarian) Meet UI never finds the control.
        ids: 13951 13952 14018 14153.
    blast_radius:          # structured (pack-cutting.md): files · services · contracts · shared
      files: [services/vexa-bot/core/src/platforms/googlemeet/join.ts,
              services/vexa-bot/core/src/platforms/googlemeet/humanized/,
              services/vexa-bot/core/src/platforms/googlemeet/selectors.ts]
      services: [vexa-bot]
      contracts: []        # no API/DB/schema change — bot-internal join logic
      shared: [services/vexa-bot/core/Dockerfile]   # shared w/ 407-C — coordinate at stitch
    fix_commits: []        # filled by 407-A develop
    proves:                # NEW registry checks — registry_changes_approved (human)
      - {check: gmeet.humanized_join_click_hits,  modes: [compose, helm], status: new}
      - {check: gmeet.localized_join_selectors,   modes: [compose, helm], status: new}
    required_modes: [compose]
    human_verify:
      - {mode: helm, do: "dispatch a bot to a live Google Meet, incl. a non-English (hl=hu) UI",
                     expect: "bot joins + transcribes on first attempt"}   # #407 REQUIRED live gate
    validation:        # validation-statement.md — claim only the rung reached
      how: "BUILDS-CLEAN (in-container tsc, bot image built ✓) + SYNTHETIC unit 28/0 (humanized.test vs mocks: dryRun X11, fake Page, hand-rolled selector matcher + hu mock DOM). The real humanized click on a live Meet is NOT compose-testable — live-human."
      regressions_assured: "binds gmeet.humanized_join_click_hits + gmeet.localized_join_selectors; FULL corpus at stitch."
      tests_done: "humanized.test.ts 28/0 (re-run, verified); admission.test.ts 5/0; tsc on touched files."
      not_yet_validated: "real XTEST click landing on a real Meet button (the actual bug); real localized (hu) Chromium DOM; compose/lite/helm."
      live_human: "REQUIRED + PENDING — external (Google-side) cause; synthetic cannot prove."
    stitchability: "shares the bot Dockerfiles with 407-C — coordinate at stitch."

  - id: meeting-api-join-callback
    pack: 407-B
    source: prod_db
    problem: |
      Bot's JOINING status callback to meeting-api times out (5s ×2) → "server rejected after
      3 attempts" → bot aborts BEFORE attempting to join. 13/35 failures, deploy/rollout-correlated
      (meeting-api restarted at hotfix). ids: 13872 13873 13878 13888 13906 13907 13930 13932
      13943 13948 13998 14148 (+1).
    hypothesis: |
      Server-side callback contract/availability under rollout, and/or too-tight bot-side timeout
      + non-idempotent retry. A transient meeting-api unavailability should not abort an otherwise
      fine join. (Confirmed by 407-B develop.)
    blast_radius:          # structured
      files: [services/vexa-bot/core/src/services/unified-callback.ts]
      services: [vexa-bot]   # bot-side timeout/retry; server callback contract consumed, not changed
      contracts: ["meeting-api bot_joining_callback (consumed; transient 5xx must NOT abort the join)"]
      shared: []
    fix_commits: []
    proves:
      - {check: gmeet.join_callback_resilient, modes: [compose], status: new}
    required_modes: [compose]
    validation:        # validation-statement.md
      how: "BUILDS-CLEAN (in-container tsc, bot image built ✓). Transient-vs-deliberate callback behaviour NOT yet exercised — needs a fault-injection harness (meeting-api returning 5xx vs 4xx) not yet built, else live. No unit tests written."
      regressions_assured: "binds gmeet.join_callback_resilient; FULL corpus at stitch."
      tests_done: "code inspection + diff review only."
      not_yet_validated: "any runtime; transient-vs-deliberate behaviour against a real meeting-api under a real rollout; compose/lite/helm."
      live_human: "REQUIRED + PENDING at stitch + eyeball."
    stitchability: "server-side; low collision risk with 407-A/C."

  - id: bot-zero-log-crash
    pack: 407-C
    source: prod_db
    problem: |
      Container starts but emits ZERO logs before dying — 3/35 (Jun 3). Same class as the crash
      that forced the 2026-06-02 revert; the corrected build did not fully eliminate it.
      ids (zero/near-zero log): 13922 13923 13985 13988 14075.
    hypothesis: |
      Crash before the logger initializes — suspect a missing humanized runtime dep
      (xdotool/xclip/X) or a Zod schema parse throw at import. Fix: always emit a startup log line
      before any crashable init; fail LOUD on missing humanized deps (no silent fallback).
    blast_radius:          # structured
      files: [services/vexa-bot/core/src/docker.ts, services/vexa-bot/core/entrypoint.sh]
      services: [vexa-bot]
      contracts: ["meeting-api failure-callback (status=failed, reason=startup_failure) — now emitted on pre-runBot crash"]
      shared: [services/vexa-bot/core/Dockerfile]   # shared w/ 407-A — coordinate at stitch
    fix_commits: []
    proves:
      - {check: gmeet.bot_startup_logged, modes: [compose, lite], status: new}
    required_modes: [compose]
    validation:        # validation-statement.md
      how: "COMPOSE (functional) ✓: builds-clean (in-container tsc, image built) + crash-report test GREEN in a real container — invalid BOT_CONFIG → startup breadcrumb emitted + failure callback fires to meeting-api (status=failed, reason=startup_failure, with the Zod error), instead of a silent zero-log crash. bash -n clean on entrypoint.sh."
      regressions_assured: "binds gmeet.bot_startup_logged; FULL corpus at stitch."
      tests_done: "bash -n on entrypoint.sh + diff review only."
      not_yet_validated: "the crash-report callback actually reaching meeting-api from a real failing container; the entrypoint path in a real image; that a real pre-runBot crash is now recorded."
      live_human: "REQUIRED + PENDING at stitch + eyeball."
    stitchability: "shares the bot Dockerfiles with 407-A — coordinate at stitch."

dependencies:        # pack → packs it depends on (drop-vs-wait input at the stitch barrier)
  407-A: []          # independent — 0-conflict union verified
  407-B: []          # independent (server-side)
  407-C: []          # independent; shares the bot Dockerfile with 407-A (coordinate at stitch, still mergeable-independent)
  # all independent ⇒ any guilty pack can be dropped and the rest shipped without it

out_of_scope:
  - {id: 412, why: "long-meeting 60-min audio overwrite — recording durability, not join"}
  - {id: gmeet-joined-no-transcript, why: "22 sessions >=60s with zero transcript rows — transcription, separate"}

ruled_out:
  - {claim: "silent humanized->synthetic fallback reintroducing the Google-block", evidence: "zero field hits for the fallback log line in bot_logs across the window"}
