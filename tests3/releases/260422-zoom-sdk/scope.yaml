  # G — Smoke-contract + tier-meeting test parity
  # ═══════════════════════════════════════════════════════════════════
  - id: zoom-sdk-smoke-contract-and-meeting-tts-parity
    source: internal
    ref: "groom.md Pack G; tests3/tests/meeting-tts-teams.sh; tests3/test-registry.yaml:35-49,161-165"
    problem: |
      Two gaps prevent zoom-sdk from being visible to the tests3
      machinery the way gmeet + msteams are:
      1. `tests3/test-registry.yaml` `smoke-contract.features` lists
         `realtime-transcription/gmeet` + `realtime-transcription/
         msteams` but no zoom variant. Static contract checks never
         bind against zoom-sdk → its DoDs (from Issue E) can't be
         graded.
      2. No tier-meeting test for zoom-sdk. gmeet has `meeting-tts.sh`
         (tier=meeting, features includes `realtime-transcription/
         gmeet`); teams has `meeting-tts-teams.sh` (tier=meeting,
         features=`realtime-transcription/msteams`). Without a
         `meeting-tts-zoom-sdk.sh` equivalent, no empirical score.json
         can be collected → Issue-E DoDs 1-5 have no evidence binding.
    hypothesis: |
      Two mechanical additions:
      - `tests3/test-registry.yaml`: add
        `realtime-transcription/zoom-sdk` to `smoke-contract.features`
        list (line ~49 in current file). `zoom-web` stays absent this
        cycle (deferred).
      - `tests3/tests/meeting-tts-zoom-sdk.sh` (new): mirror
        `meeting-tts-teams.sh` structure. Phases: cleanup stale bots →
        create browser-session host + same-account Zoom meeting →
        launch recorder + N speaker bots with `platform=zoom_sdk` →
        admit all (manual step; Zoom SDK same-account join is
        auto-admit once host is in) → send TTS utterances → fetch
        transcript → score against ground truth → cleanup. Register
        in test-registry: `tier: meeting`, `runs_in: []` (tier-meeting
        runs off-band), `features: [realtime-transcription,
        realtime-transcription/zoom-sdk]`. Produce
        `testdata/zoom-sdk-compose-260422/` on first clean run.
    fix_commits: []
    proves:
      - {check: ZOOM_SDK_IN_SMOKE_CONTRACT_FEATURES, modes: [lite, compose, helm]}
      - {check: MEETING_TTS_ZOOM_SDK_SCRIPT_EXISTS, modes: [lite, compose, helm]}
      - {check: MEETING_TTS_ZOOM_SDK_REGISTERED_TIER_MEETING, modes: [lite, compose, helm]}
      - {test: meeting-tts-zoom-sdk, step: transcript, modes: [compose]}
    required_modes: [lite, compose]
    human_verify:
      - mode: compose
        do: "Configure Zoom SDK same-account credentials on the runner; run `bash tests3/tests/meeting-tts-zoom-sdk.sh`"
        expect: "Script creates meeting, launches recorder + speakers, TTS sent, transcript fetched with ≥1 segment; `testdata/zoom-sdk-compose-260422/pipeline/score.json` written with speaker_accuracy + avg_similarity + completeness metrics"
      - mode: lite
        do: "grep 'realtime-transcription/zoom-sdk' tests3/test-registry.yaml"
        expect: "Match in smoke-contract.features"

