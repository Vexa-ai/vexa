approval_source: |
  Draft per plan-stage AI, scope traces to groom.md packs F+A+B+C+D+E+H+I+G
  (all approved by user "let's go" + "add msteams dods restore as well if
  not present" on 2026-04-22). Groom recommended Shape 1 (full parity).

  # ─── Product narrative (what we deliver — use at ship time) ───

  Elevator pitch: "Zoom SDK recording, working and documented, on par
  with Google Meet — plus regression guards so it stays that way."

  1. Zoom native SDK recording works end-to-end (closes #150, 13-month
     community friction).
  2. Two Zoom platforms (`zoom_sdk` + `zoom_web`) replace one opaque
     `zoom` enum; old value keeps working for one cycle with a
     deprecation header.
  3. `POST /bots platform=zoom_sdk` fails fast (structured 503)
     instead of silent 201 → later failure (closes #128).
  4. Meet + Teams + Zoom-SDK all gated at 75% confidence; silent
     transcription-quality drift cannot recur.

  Winners: self-hosters wanting Zoom recording (biggest), API
  integrators (cleaner contract), Vexa team (regression guards).
  No change: hosted users, Zoom web client behaviour.

  # ─── Bulk approval signal ───
  Human turn: "approve all" on 2026-04-22T16:05Z — same precedent as
  260421's eyeroll bulk-flip (bc5c305 "human(eyeroll): tick all 33
  items per user signal"). All 123 approval flags flipped in one
  pass, plan artefacts ready to advance to develop.

