[[tool]]
name = "semgrep"
command = ["semgrep", "scan", "--config", "auto", "--sarif", "-o", "{raw}/semgrep.sarif", "{target}"]
raw_output = "semgrep.sarif"
categories = ["sast"]
rationale = "Broad multi-language SAST and custom bad-pattern coverage."

[[tool]]
name = "gitleaks"
command = ["gitleaks", "dir", "{target}", "--config", "{target}/tests3/gitleaks-release.toml", "--report-format", "json", "--report-path", "{raw}/gitleaks.json", "--no-banner"]
raw_output = "gitleaks.json"
categories = ["secrets"]
rationale = "Secret scanning for current release source; local env files and generated build outputs are excluded by policy."

[[tool]]
name = "trivy"
command = ["trivy", "fs", "--format", "sarif", "--output", "{raw}/trivy.sarif", "{target}"]
raw_output = "trivy.sarif"
categories = ["sca", "iac", "secrets"]
rationale = "Filesystem dependency, IaC, secret, and vulnerability scan."

[[tool]]
name = "osv-scanner"
command = ["osv-scanner", "scan", "source", "--lockfile", "{target}/services/dashboard/package-lock.json", "--lockfile", "{target}/services/vexa-bot/package-lock.json", "--lockfile", "{target}/packages/transcript-rendering/package-lock.json", "--format", "json"]
raw_output = "osv.json"
categories = ["sca"]
rationale = "Known vulnerable dependency detection from OSV advisories for lockfile ecosystems; Python requirements are gated by pip-audit."

[[tool]]
name = "syft"
command = ["syft", "{target}", "-o", "cyclonedx-json"]
raw_output = "sbom.cyclonedx.json"
categories = ["sbom"]
rationale = "SBOM inventory for release and vulnerability correlation."

[[tool]]
name = "zizmor"
command = ["zizmor", "--format", "sarif", "{target}"]
raw_output = "zizmor.sarif"
categories = ["ci-cd"]
triggers = [".github/workflows"]
rationale = "GitHub Actions supply-chain and workflow risk detection."

[[tool]]
name = "actionlint"
command = ["actionlint", "-format", "{{json .}}"]
raw_output = "actionlint.json"
categories = ["ci-cd"]
triggers = [".github/workflows"]
rationale = "GitHub Actions syntax and workflow expression validation."

[[tool]]
name = "bandit"
command = ["bandit", "-r", ".", "-x", ".git,.claude,.codex,.venv,venv,node_modules,dist,build,tests,tests3", "-f", "json", "-o", "{raw}/bandit.json"]
raw_output = "bandit.json"
categories = ["sast"]
triggers = ["python"]
rationale = "Python security bad-pattern scan."

[[tool]]
name = "pip-audit"
command = ["pip-audit", "--path", "{target}", "--format", "json"]
raw_output = "pip-audit.json"
categories = ["sca"]
triggers = ["pip"]
rationale = "Python dependency vulnerability scan."
