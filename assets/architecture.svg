<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 610" role="img" aria-labelledby="t d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="t">Vexa architecture</title>
  <desc id="d">One API gateway routes to two domains — Meetings and Agents — both running on one runtime that spawns each bot and agent in its own sandboxed container on Docker, Kubernetes, or Process.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .mono { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; }
      .edge { stroke: #64748b; stroke-width: 1.8; fill: none; }
      .lbl  { fill: #64748b; }
    </style>
  </defs>

  <!-- domain panels -->
  <rect x="36"  y="88" width="388" height="486" rx="18" fill="#0ea5e9" opacity="0.07"/>
  <rect x="496" y="88" width="388" height="486" rx="18" fill="#8b5cf6" opacity="0.07"/>

  <!-- column headers -->
  <text x="160" y="112" fill="#0ea5e9" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">MEETINGS</text>
  <text x="760" y="112" fill="#8b5cf6" font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">AGENTS</text>

  <!-- gateway -->
  <rect x="285" y="30" width="350" height="46" rx="10" fill="#6366f1"/>
  <text x="460" y="58" fill="#ffffff" font-size="16.5" font-weight="600" text-anchor="middle">API gateway · X-API-Key</text>

  <!-- gateway -> apis -->
  <line class="edge" x1="350" y1="76" x2="168" y2="150" marker-end="url(#arrow)"/>
  <line class="edge" x1="570" y1="76" x2="752" y2="150" marker-end="url(#arrow)"/>
  <text class="mono" x="300" y="120" fill="#0ea5e9" font-size="11" text-anchor="middle">POST /bots</text>
  <text class="mono" x="620" y="120" fill="#8b5cf6" font-size="11" text-anchor="middle">POST /agent/*</text>

  <!-- meeting-api / agent-api -->
  <rect x="75"  y="152" width="175" height="56" rx="10" fill="#0ea5e9"/>
  <text x="162" y="178" fill="#ffffff" font-size="15" font-weight="600" text-anchor="middle">meeting-api</text>
  <text x="162" y="197" fill="#e0f2fe" font-size="10.5" text-anchor="middle">bots · transcripts · recordings</text>

  <rect x="670" y="152" width="175" height="56" rx="10" fill="#8b5cf6"/>
  <text x="757" y="178" fill="#ffffff" font-size="15" font-weight="600" text-anchor="middle">agent-api</text>
  <text x="757" y="197" fill="#ede9fe" font-size="10.5" text-anchor="middle">chat · routines · events</text>

  <!-- apis -> runtime -->
  <line class="edge" x1="250" y1="182" x2="346" y2="276" marker-end="url(#arrow)"/>
  <line class="edge" x1="670" y1="182" x2="574" y2="276" marker-end="url(#arrow)"/>
  <text class="lbl" x="284" y="220" font-size="10.5" text-anchor="middle">dispatch</text>
  <text class="lbl" x="636" y="220" font-size="10.5" text-anchor="middle">dispatch</text>

  <!-- runtime -->
  <rect x="350" y="248" width="220" height="98" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="460" y="286" fill="#ffffff" font-size="21" font-weight="700" letter-spacing="1" text-anchor="middle">RUNTIME</text>
  <text x="460" y="308" fill="#94a3b8" font-size="11" text-anchor="middle">isolated · ephemeral · reaped on idle</text>
  <text x="460" y="328" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">Docker · Kubernetes · Process</text>

  <!-- runtime -> containers -->
  <text class="lbl" x="460" y="378" font-size="11" text-anchor="middle">spawns one container per workload</text>
  <line class="edge" x1="415" y1="346" x2="260" y2="426" marker-end="url(#arrow)"/>
  <line class="edge" x1="505" y1="346" x2="660" y2="426" marker-end="url(#arrow)"/>

  <!-- containers -->
  <rect x="95" y="430" width="310" height="128" rx="14" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="250" y="460" fill="#ffffff" font-size="15" font-weight="600" text-anchor="middle">vexa-bot container</text>
  <text x="250" y="487" fill="#cbd5e1" font-size="11.5" text-anchor="middle">joins the call → captures audio</text>
  <text x="250" y="509" fill="#cbd5e1" font-size="11.5" text-anchor="middle">Whisper → transcript.v1</text>
  <text x="250" y="531" fill="#38bdf8" font-size="11.5" text-anchor="middle">→ Redis stream → your API</text>

  <rect x="515" y="430" width="310" height="128" rx="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="670" y="460" fill="#ffffff" font-size="15" font-weight="600" text-anchor="middle">agent container</text>
  <text x="670" y="487" fill="#cbd5e1" font-size="11.5" text-anchor="middle">mounts /workspace (git Markdown · OKF)</text>
  <text x="670" y="509" fill="#cbd5e1" font-size="11.5" text-anchor="middle">reads · writes · commits</text>
  <text x="670" y="531" fill="#c4b5fd" font-size="11.5" text-anchor="middle">→ streams SSE (message-delta · commit)</text>

  <!-- caption -->
  <text x="460" y="590" fill="#64748b" font-size="11.5" font-style="italic" text-anchor="middle">A bot and an agent are the same runtime.v1 workload.</text>
</svg>
