# The vendored dashboard (clients/dashboard), wired to the compose gateway. An OVERLAY on
# docker-compose.yml so the control-plane stack stays dashboard-free by default.
#
#   # 1. stack up, 2. mint a token (idempotent), 3. dashboard up with that token:
#   DASHBOARD_API_KEY=$(make -s provision-token ADMIN_TOKEN=<admin-secret>) \
#     docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d dashboard
#
# NOTE: the DASHBOARD_API_KEY token MUST exist in the stack DB. A DB reset (or a fresh `up`) without
# re-running step 2 leaves the baked key dangling → every request 401s ("Invalid API key"), because the
# gateway → admin-api /internal/validate correctly rejects a token that isn't in the DB. Re-run
# `make provision-token` after any DB reset. See deploy/compose/bin/provision-token.
#
# Build context is the repo root (../..) so it pulls in packages/transcript-rendering.
services:
  dashboard:
    build:
      context: ../..
      dockerfile: clients/dashboard/Dockerfile
      args:
        VEXA_API_URL: http://gateway:8000
    image: vexa-dashboard:${IMAGE_TAG:-dev}
    environment:
      # Internal SSOT — the dashboard's Next proxy + /ws rewrite target the gateway on the vexa network.
      - VEXA_API_URL=http://gateway:8000
      # Self-host mode: the config route serves this as the WS/API auth token (no login needed) — the
      # harness mints a scoped token and passes it here. (api/config/route.ts: cookie || VEXA_API_KEY.)
      - VEXA_API_KEY=${DASHBOARD_API_KEY:-}
      # Browser-facing gateway host port, so the dashboard hands the browser a reachable WS/API URL.
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-18056}
      # The browser-facing gateway URL → the config route derives wsUrl from it (gateway-direct WS, so
      # the live transcript doesn't depend on Next.js proxying the /ws upgrade).
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-http://127.0.0.1:18056}
      # Admin surface (user/token management, the login health check). admin-api on the vexa network is
      # :8001; its key is the same ADMIN_TOKEN the rest of the stack signs with. Without these the
      # dashboard's /login + admin pages show "Admin API key not configured".
      - VEXA_ADMIN_API_URL=${VEXA_ADMIN_API_URL:-http://admin-api:8001}
      - VEXA_ADMIN_API_KEY=${ADMIN_TOKEN:-gate-admin-token}
      # Self-host auth machinery (direct/magic-link login, no external OAuth). SMTP/Google/Azure stay
      # optional (the health check treats them as such); these are the required base.
      - VEXA_ALLOW_DIRECT_LOGIN=${VEXA_ALLOW_DIRECT_LOGIN:-true}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://127.0.0.1:18030}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-vexa-dash-nextauth-secret-dev}
      - JWT_SECRET=${JWT_SECRET:-vexa-dash-jwt-secret-dev}
    ports:
      - "127.0.0.1:${DASHBOARD_HOST_PORT:-18030}:3000"
    depends_on:
      gateway:
        condition: service_healthy
    networks: [vexa]
