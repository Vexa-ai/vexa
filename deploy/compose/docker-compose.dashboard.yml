# The vendored dashboard (clients/dashboard), wired to the compose gateway. An OVERLAY on
# docker-compose.yml so the control-plane stack stays dashboard-free by default.
#
#   # 1. stack up, 2. mint a token, 3. dashboard up with that token:
#   DASHBOARD_API_KEY=<token> docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d dashboard
#
# Build context is the repo root (../..) so it pulls in packages/transcript-rendering.
services:
  dashboard:
    build:
      context: ../..
      dockerfile: clients/dashboard/Dockerfile
      args:
        VEXA_API_URL: http://gateway:8000
    image: vexa-dashboard:${IMAGE_TAG:-dev}
    environment:
      # Internal SSOT — the dashboard's Next proxy + /ws rewrite target the gateway on the vexa network.
      - VEXA_API_URL=http://gateway:8000
      # Self-host mode: the config route serves this as the WS/API auth token (no login needed) — the
      # harness mints a scoped token and passes it here. (api/config/route.ts: cookie || VEXA_API_KEY.)
      - VEXA_API_KEY=${DASHBOARD_API_KEY:-}
      # Browser-facing gateway host port, so the dashboard hands the browser a reachable WS/API URL.
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-18056}
      # The browser-facing gateway URL → the config route derives wsUrl from it (gateway-direct WS, so
      # the live transcript doesn't depend on Next.js proxying the /ws upgrade).
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-http://127.0.0.1:18056}
    ports:
      - "127.0.0.1:${DASHBOARD_HOST_PORT:-18030}:3000"
    depends_on:
      gateway:
        condition: service_healthy
    networks: [vexa]
