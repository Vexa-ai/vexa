# Hot-reload dev override — bind-mount host source + reload commands so an edit reflects
# LIVE with NO rebuild / PR / gates / merge. The images already carry the deps; we just run
# the shipped source from a bind mount under a file-watching server.
#
#   HOT UP:   IMAGE_TAG=fixdev docker compose -p eyeball-compose -f docker-compose.yml -f docker-compose.hot.yml up -d <svc>
#   REVERT:   IMAGE_TAG=fixdev docker compose -p eyeball-compose up -d <svc>   # drops override → back to the built image
#
# Edit files under ~/eyeball/vexa/{core,clients} → change is live in seconds.
services:
  meeting-api:
    command: ["uvicorn","meeting_api.__main__:app","--host","0.0.0.0","--port","8080","--reload","--reload-dir","/app/src"]
    volumes:
      - ../../core/meetings/services/meeting-api/src:/app/src

  agent-api:
    command: ["uvicorn","control_plane.api:app","--host","0.0.0.0","--port","8100","--reload","--reload-dir","/app/control_plane","--reload-dir","/app/shared"]
    volumes:
      - ../../core/agent/control_plane:/app/control_plane
      - ../../core/agent/shared:/app/shared

  runtime:
    command: ["uvicorn","runtime_kernel.api:app","--host","0.0.0.0","--port","8090","--reload","--reload-dir","/app/src"]
    volumes:
      - ../../core/runtime/src:/app/src

  terminal:
    command: ["node","server.mjs"]
    environment:
      - NODE_ENV=development
      - NEXTAUTH_URL=http://localhost:15300
    volumes:
      - ../../clients/terminal/src:/app/src
      - ../../clients/terminal/public:/app/public
      - ../../clients/terminal/next.config.ts:/app/next.config.ts
      - ../../clients/terminal/tsconfig.json:/app/tsconfig.json
