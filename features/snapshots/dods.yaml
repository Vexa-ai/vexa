# Phase 5: DoDs wired to real evidence checks.
# Gate ratcheted from 0 to 70 (SHIP-03).
# Each evidence.check references a check ID registered in tests3/test-registry.yaml
# or a pytest test name.

gate:
  confidence_min: 70

dods:
- id: frame_extractor_module_exists
  label: "services/meeting-api/meeting_api/frame_extractor.py exists with extract_frames_if_enabled() exported"
  weight: 15
  evidence:
    check: snapshots.extractor_module
    modes:
    - lite
    - compose

- id: recording_frames_table_exists
  label: "\\d recording_frames in psql shows columns with correct types (Integer timestamp_s, composite index, unique constraint)"
  weight: 15
  evidence:
    check: snapshots.frames_model_schema
    modes:
    - lite
    - compose

- id: snapshots_endpoint_returns_presigned_urls
  label: "GET /recordings/{id}/frames returns {extraction_status, frames[], total} with presigned URLs"
  weight: 20
  evidence:
    check: snapshots.response_shape
    modes:
    - lite
    - compose

- id: gallery_renders_with_click_to_seek
  label: "clicking a thumbnail in the dashboard seeks videoPlayerRef.current (and audioPlayerRef.current) to the matching timestamp_s"
  weight: 20
  evidence:
    check: snapshots.gallery_seek
    modes:
    - compose

- id: gallery_renders_when_speaker_fields_empty
  label: "gallery must NOT couple to broken diarization — snapshot frames are indexed by timestamp_s, not speaker label"
  weight: 10
  evidence:
    check: snapshots.no_speaker_coupling
    modes:
    - compose

- id: extractor_skips_when_disabled
  label: "SNAPSHOTS_ENABLED=false default is honored — worker early-returns; endpoint returns 404 snapshots disabled"
  weight: 20
  evidence:
    check: snapshots.gate_disabled
    modes:
    - lite
    - compose