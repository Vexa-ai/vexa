<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dash-status-history L4 render fixture</title>
  </head>
  <body>
    <!--
      render.html — the L4 fixture page.

      A REAL browser loads this. It runs the REAL @vexa/dash-status-history component (bundled into
      render-bundle.js by esbuild from the brick source) by mounting it with the golden transitions via
      react-dom. If chromium paints the joining → active → completed rows into the DOM below, the
      component renders props a human's browser can see. That is the whole assertion.

      DOM contract the spec reads:
        #root <ol.status-history>           → one <li.status-history__row> per transition
        li.status-history__row              → [data-status, data-index]; newest has [data-current]
        .status-history__status (in a row)  → the human status label ("Joining"/"Active"/"Completed")
        #harness-ready                      → exists once the component has mounted (deterministic wait)
        #harness-error                      → exists with the error text if mounting threw
    -->
    <h1>dash-status-history L4 render fixture</h1>
    <div id="root"></div>

    <script type="module" src="./render-bundle.js"></script>
  </body>
</html>
