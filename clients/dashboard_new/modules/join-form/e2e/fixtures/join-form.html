<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JoinForm L4 mount fixture</title>
  </head>
  <body>
    <!--
      join-form.html — the L4 fixture page.

      A REAL browser loads this. It mounts the REAL @vexa/dash-join-form `JoinForm` component (bundled
      into form-bundle.js by esbuild from the brick source, with react/react-dom) into #root, with
      golden props. The Playwright spec then drives the real DOM — pick a platform if needed, fill the
      meeting URL input, click "Start bot" — and asserts the component fired onSubmit with the parsed
      platform + native id (recorded onto window.__submitted by form-entry.tsx).

      DOM contract the spec reads:
        #root            → the mounted JoinForm (real inputs + select + submit button)
        #harness-ready   → exists once the component has mounted (deterministic wait point)
        window.__submitted → array of CreateBotRequest objects the component handed to onSubmit
    -->
    <div id="root"></div>
    <script type="module" src="./form-bundle.js"></script>
  </body>
</html>
