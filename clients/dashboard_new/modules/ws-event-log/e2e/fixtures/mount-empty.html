<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dash-ws-event-log L4 empty-state fixture</title>
  </head>
  <body>
    <!-- Mounts WsEventLog with events=[] so the spec can assert the empty-state DOM branch. -->
    <h1>dash-ws-event-log L4 empty-state fixture</h1>
    <div id="root"></div>
    <script type="module">
      import "./mount-empty-bundle.js";
    </script>
    <script>
      window.addEventListener("error", (e) => {
        if (document.getElementById("harness-error")) return;
        const pre = document.createElement("pre");
        pre.id = "harness-error";
        pre.textContent = String((e.error && e.error.stack) || e.message);
        document.body.appendChild(pre);
      });
    </script>
  </body>
</html>
