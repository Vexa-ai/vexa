<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dash-recording-players L4 render fixture</title>
  </head>
  <body>
    <!--
      players-render.html — the L4 fixture page.

      A REAL browser loads this. It mounts the REAL AudioPlayer + VideoPlayer (bundled into
      players-bundle.js by esbuild from the brick source) with golden props, exactly as a dashboard view
      would. If chromium paints the <audio>/<video> elements + their play controls into the DOM, the
      brick's components render in a human's browser. That is the assertion.

      DOM contract the spec reads (scoped per mount root):
        #audio-single  → AudioPlayer mounted with a single golden src
        #audio-multi   → AudioPlayer mounted with golden fragments (stitched timeline)
        #video         → VideoPlayer mounted with a golden src
        #harness-ready → exists once all three have been mounted (deterministic wait point)
        #harness-error → exists with the error text if mounting threw
    -->
    <h1>dash-recording-players L4 render fixture</h1>
    <div id="audio-single"></div>
    <div id="audio-multi"></div>
    <div id="video"></div>

    <script type="module">
      import { mountAudio, mountVideo } from "./players-bundle.js";
      import {
        GOLDEN_AUDIO_SRC,
        GOLDEN_VIDEO_SRC,
        GOLDEN_FRAGMENTS,
      } from "./golden.js";

      function fail(err) {
        const marker = document.createElement("pre");
        marker.id = "harness-error";
        marker.textContent = String((err && err.stack) || err);
        document.body.appendChild(marker);
      }

      try {
        // Single-source AudioPlayer.
        mountAudio(document.getElementById("audio-single"), {
          src: GOLDEN_AUDIO_SRC,
        });

        // Multi-fragment AudioPlayer (stitched virtual timeline across two recordings).
        mountAudio(document.getElementById("audio-multi"), {
          fragments: GOLDEN_FRAGMENTS,
        });

        // VideoPlayer.
        mountVideo(document.getElementById("video"), {
          src: GOLDEN_VIDEO_SRC,
        });

        const ready = document.createElement("div");
        ready.id = "harness-ready";
        document.body.appendChild(ready);
      } catch (err) {
        fail(err);
      }
    </script>
  </body>
</html>
