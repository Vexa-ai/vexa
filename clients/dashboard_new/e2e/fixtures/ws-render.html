<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>dash-ws L4 render fixture</title>
  </head>
  <body>
    <!--
      ws-render.html — the L4 fixture page.

      A REAL browser loads this. It runs the REAL @vexa/dash-ws brick (bundled into ws-bundle.js by
      esbuild from the brick source) over the REAL FakeWsTransport, wires the client's callbacks to the
      DOM exactly as a dashboard view would, then injects the golden ws.v1 frames. If chromium paints
      the status + transcript lines into the DOM below, the brick delivers frames a human's browser can
      render. That is the whole assertion.

      DOM contract the spec reads:
        #status         → text content is the normalized meeting status ("active")
        #transcript     → one <div class="line"> per confirmed segment, text `Speaker: text`
        #harness-ready  → exists once the goldens have been emitted (deterministic wait point)
        #harness-error  → exists with the error text if wiring threw (turns a silent blank into a fail)
    -->
    <h1>dash-ws L4 render fixture</h1>
    <p>status: <span id="status">(none)</span></p>
    <div id="transcript"></div>

    <script type="module">
      import { createWsClient, createFakeWsTransport } from "./ws-bundle.js";
      import {
        GOLDEN_MEETING,
        GOLDEN_STATUS,
        GOLDEN_TRANSCRIPT,
      } from "./golden.js";

      const statusEl = document.getElementById("status");
      const transcriptEl = document.getElementById("transcript");

      function fail(err) {
        const marker = document.createElement("pre");
        marker.id = "harness-error";
        marker.textContent = String((err && err.stack) || err);
        document.body.appendChild(marker);
      }

      try {
        // ── deterministic transport: no network, the page drives the frames ──────────────────────────
        const transport = createFakeWsTransport();

        // ── the REAL unified client, wired to the DOM the way a dashboard view would ─────────────────
        const client = createWsClient({
          transport,
          wsUrl: "wss://harness.local/ws",
          authToken: "golden-token",
          meeting: GOLDEN_MEETING,
          onStatus: (status) => {
            statusEl.textContent = String(status);
          },
          onTranscript: (update) => {
            // A `transcript` bundle delivers confirmed/pending arrays; a single
            // `transcription_segment` delivers `segments`. Paint whichever arrived.
            const segs = update.confirmed ?? update.segments ?? [];
            for (const seg of segs) {
              const line = document.createElement("div");
              line.className = "line";
              const speaker = seg.speaker ?? update.speaker ?? "?";
              line.textContent = `${speaker}: ${seg.text ?? ""}`;
              transcriptEl.appendChild(line);
            }
          },
          onError: (error) => fail("ws error: " + error),
        });

        client.start();
        // on open → the client sends `subscribe` and starts pinging (real lifecycle)
        transport.fireOpen();

        // ── inject the goldens, exactly as redis would forward them on the real stack ────────────────
        transport.emit(GOLDEN_STATUS);
        transport.emit(GOLDEN_TRANSCRIPT);

        // ── deterministic ready marker for the spec to await ─────────────────────────────────────────
        const ready = document.createElement("div");
        ready.id = "harness-ready";
        document.body.appendChild(ready);
      } catch (err) {
        fail(err);
      }
    </script>
  </body>
</html>
