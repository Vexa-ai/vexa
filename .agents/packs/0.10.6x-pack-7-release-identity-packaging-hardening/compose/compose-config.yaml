name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening
services:
  admin-api:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/admin-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    environment:
      ADMIN_API_TOKEN: changeme
      DB_HOST: postgres
      DB_NAME: vexa
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      DB_SSL_MODE: disable
      DB_USER: postgres
      INTERNAL_API_SECRET: vexa-internal-secret
      LOG_LEVEL: INFO
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8001/')
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    image: vexaai/admin-api:0.10.6.2.1
    init: true
    networks:
      vexa: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8001
        published: "8057"
        protocol: tcp
    restart: unless-stopped
  api-gateway:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      admin-api:
        condition: service_healthy
        required: true
      meeting-api:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      ADMIN_API_URL: http://admin-api:8001
      AGENT_API_URL: http://agent-api:8100
      CALENDAR_SERVICE_URL: http://calendar-service:8050
      CORS_ORIGINS: '*'
      INTERNAL_API_SECRET: vexa-internal-secret
      LOG_LEVEL: INFO
      MCP_URL: http://mcp:18888
      MEETING_API_URL: http://meeting-api:8080
      RATE_LIMIT_RPM: "120"
      REDIS_URL: redis://redis:6379/0
      TRANSCRIPTION_COLLECTOR_URL: http://meeting-api:8080
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/')
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    image: vexaai/api-gateway:0.10.6.2.1
    init: true
    mem_limit: "1073741824"
    networks:
      vexa: null
    ports:
      - mode: ingress
        target: 8000
        published: "44461"
        protocol: tcp
    restart: unless-stopped
  dashboard:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_VEXA_OSS_RELEASE_DATE: "2026-05-23"
        NEXT_PUBLIC_VEXA_OSS_VERSION: 0.10.6.2.1
    depends_on:
      api-gateway:
        condition: service_started
        required: true
    environment:
      API_GATEWAY_HOST_PORT: "44461"
      JWT_SECRET: vexa-dev-jwt-secret
      NEXT_PUBLIC_APP_URL: ""
      VEXA_ADMIN_API_KEY: changeme
      VEXA_ADMIN_API_URL: http://admin-api:8001
      VEXA_API_KEY: ""
      VEXA_API_URL: http://api-gateway:8000
      VEXA_PUBLIC_API_URL: ""
    image: vexaai/dashboard:0.10.6.2.1
    init: true
    mem_limit: "1073741824"
    networks:
      vexa: null
    ports:
      - mode: ingress
        target: 3000
        published: "44460"
        protocol: tcp
    restart: unless-stopped
  mcp:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/mcp/Dockerfile
    depends_on:
      api-gateway:
        condition: service_started
        required: true
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
      LOG_LEVEL: INFO
    image: vexaai/mcp:0.10.6.2.1
    init: true
    mem_limit: "536870912"
    networks:
      vexa: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 18888
        published: "44467"
        protocol: tcp
    restart: unless-stopped
  meeting-api:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/meeting-api/Dockerfile
    depends_on:
      postgres:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      runtime-api:
        condition: service_started
        required: true
    environment:
      ADMIN_TOKEN: changeme
      BOT_IMAGE_NAME: vexaai/vexa-bot:0.10.6.2.1
      CAPTURE_MODES: audio
      DB_HOST: postgres
      DB_NAME: vexa
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      DB_SSL_MODE: disable
      DB_USER: postgres
      DOCKER_NETWORK: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_vexa
      INTERNAL_API_SECRET: vexa-internal-secret
      LOG_LEVEL: INFO
      MEETING_API_URL: http://meeting-api:8080
      MINIO_ACCESS_KEY: vexa-access-key
      MINIO_BUCKET: vexa
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ""
      MINIO_SECRET_KEY: vexa-secret-key
      MINIO_SECURE: "false"
      OPENAI_API_KEY: ""
      POST_MEETING_HOOKS: http://agent-api:8100/internal/webhooks/meeting-completed
      RECORDING_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      RUNTIME_API_TOKEN: ""
      RUNTIME_API_URL: http://runtime-api:8090
      STORAGE_BACKEND: minio
      TRANSCRIPTION_COLLECTOR_URL: http://meeting-api:8080
      TRANSCRIPTION_GATEWAY_URL: ""
      TRANSCRIPTION_SERVICE_TOKEN: ""
      TRANSCRIPTION_SERVICE_URL: ""
      TTS_SERVICE_URL: http://tts-service:8002
    expose:
      - "8080"
    image: vexaai/meeting-api:0.10.6.2.1
    init: true
    mem_limit: "1073741824"
    networks:
      vexa: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: recordings-data
        target: /data/recordings
        volume: {}
  minio:
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_PASSWORD: vexa-secret-key
      MINIO_ROOT_USER: vexa-access-key
    image: minio/minio:latest
    mem_limit: "1073741824"
    networks:
      vexa: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 9000
        published: "44465"
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 9001
        published: "44466"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: minio-data
        target: /data
        volume: {}
  minio-init:
    depends_on:
      minio:
        condition: service_started
        required: true
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/vexa
        exit 0
    environment:
      MINIO_ROOT_PASSWORD: vexa-secret-key
      MINIO_ROOT_USER: vexa-access-key
    image: minio/mc:latest
    networks:
      vexa: null
  postgres:
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=60000
    environment:
      POSTGRES_DB: vexa
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d vexa
      timeout: 5s
      interval: 5s
      retries: 5
    image: postgres:17-alpine
    networks:
      vexa: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 5432
        published: "44464"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
      interval: 10s
      retries: 3
    image: redis:7.0-alpine
    mem_limit: "536870912"
    networks:
      vexa: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: redis-data
        target: /data
        volume: {}
  runtime-api:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening/services/runtime-api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      AGENT_IMAGE: vexaai/vexa-agent:0.10.6.2.1
      ALLOW_PRIVATE_CALLBACKS: "1"
      API_KEYS: ""
      BOT_API_TOKEN: ""
      BROWSER_IMAGE: vexaai/vexa-bot:0.10.6.2.1
      CLAUDE_CREDENTIALS_PATH: /tmp/vexa-pack7-claude.json
      CLAUDE_JSON_PATH: /tmp/vexa-pack7-claude.json
      DB_HOST: postgres
      DB_NAME: vexa
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      DB_SSL_MODE: disable
      DB_USER: postgres
      DOCKER_NETWORK: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_vexa
      LOG_LEVEL: INFO
      MINIO_ACCESS_KEY: vexa-access-key
      MINIO_BUCKET: vexa
      MINIO_ENDPOINT: minio:9000
      MINIO_SECRET_KEY: vexa-secret-key
      PROFILES_PATH: /app/profiles.yaml
      REDIS_URL: redis://redis:6379
    group_add:
      - "998"
    image: vexaai/runtime-api:0.10.6.2.1
    init: true
    networks:
      vexa: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8090
        published: "8090"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind: {}
      - type: bind
        source: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening/services/runtime-api/profiles.yaml
        target: /app/profiles.yaml
        read_only: true
        bind: {}
  tts-service:
    build:
      context: /home/dima/dev/vexa-pack-0.10.6x-pack-7-release-identity-packaging-hardening
      dockerfile: services/tts-service/Dockerfile
    environment:
      LOG_LEVEL: INFO
      TTS_API_TOKEN: ""
    expose:
      - "8002"
    image: vexaai/tts-service:0.10.6.2.1
    init: true
    mem_limit: "1073741824"
    networks:
      vexa: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: tts-voices
        target: /app/voices
        volume: {}
networks:
  vexa:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_vexa
    driver: bridge
volumes:
  minio-data:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_minio-data
  postgres-data:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_postgres-data
  recordings-data:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_recordings-data
  redis-data:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_redis-data
  tts-voices:
    name: vexa_0_10_6x_pack_7_release_identity_packaging_hardening_tts-voices
