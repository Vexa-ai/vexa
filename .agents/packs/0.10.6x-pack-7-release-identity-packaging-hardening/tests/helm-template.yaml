# Source: vexa/templates/deployment-minio.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pack7-vexa-minio
  labels:
    app.kubernetes.io/name: vexa
    app.kubernetes.io/instance: pack7
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: vexa-0.10.6_2.1
spec:
  serviceName: pack7-vexa-minio
  replicas: 1
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: vexa
      app.kubernetes.io/instance: pack7
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vexa
        app.kubernetes.io/instance: pack7
        app.kubernetes.io/component: minio
    spec:
      # v0.10.5 Pack I.s — stateful-pod anti-affinity (#272 iter-4 fix).
      #
      # Linode LKE g6-standard-* nodes cap at 7 attached block volumes
      # per instance (boot disk + system + user PVCs). When all four
      # stateful pods (postgres + redis + minio + tts) co-locate on one
      # node, the 4th PVC fails to attach with:
      #   "max number of volumes (7) already attached to instance"
      # MinIO is typically the sufferer (StatefulSet ordering + larger
      # readiness probe + scheduler picks first-available-node first).
      #
      # Soft anti-affinity (preferredDuringSchedulingIgnoredDuringExecution)
      # spreads stateful pods across nodes when ≥2 nodes are available
      # without breaking single-node test deployments. Aligns with the
      # Pack I (chart availability defaults) shape — robustness defaults
      # should be safe-by-default, not require operator opt-in.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [postgres, redis, tts-service]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: minio
          image: "minio/minio:latest"
          imagePullPolicy: IfNotPresent
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: "vexa-access-key"
            - name: MINIO_ROOT_PASSWORD
              value: "vexa-secret-key"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
