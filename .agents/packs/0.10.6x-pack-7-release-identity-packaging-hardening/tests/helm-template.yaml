# Source: vexa/templates/job-minio-init.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: pack7-vexa-minio-init
  labels:
    app.kubernetes.io/name: vexa
    app.kubernetes.io/instance: pack7
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: vexa-0.10.6_2.1
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    # v0.10.5 Pack A.3 — drop `hook-succeeded` from delete-policy so failed
    # Jobs stay around for diagnosis. The original policy auto-deleted on
    # success which was fine, but auto-deleted on failure too — leaving no
    # trace when subsequent runs failed (#249).
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vexa
        app.kubernetes.io/instance: pack7
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: Never
      containers:
        - name: minio-init
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          # v0.10.5 Pack A.3 — replace `sleep 5` with poll-until-ready (#249).
          # On a fresh PVC, MinIO can take 30+ seconds to attach + initialize.
          # Hardcoded 5s sleep races MinIO startup → `mc mb` runs against an
          # unready server → bucket never created → recordings 500 forever
          # with `NoSuchBucket`. Polling `mc ready` (or fallback HTTP probe)
          # waits up to 120s for genuine readiness; if MinIO genuinely isn't
          # up after 2 minutes, exit non-zero so the Job retries (backoffLimit=5)
          # and the failure is visible in `kubectl get jobs`.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MINIO_HOST="http://pack7-vexa-minio:9000"
              echo "Waiting for MinIO at $MINIO_HOST (up to 120s)..."
              for attempt in $(seq 1 24); do
                if mc alias set vexa "$MINIO_HOST" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null && \
                   mc admin info vexa >/dev/null 2>&1; then
                  echo "MinIO ready after $((attempt * 5))s"
                  break
                fi
                echo "MinIO not ready yet (attempt $attempt/24), sleeping 5s..."
                sleep 5
              done
              # Final readiness check — fail loud if MinIO genuinely isn't up
              mc admin info vexa
              mc mb --ignore-existing vexa/vexa
              echo "Bucket vexa ensured"
              exit 0
          env:
            - name: MINIO_ROOT_USER
              value: "vexa-access-key"
            - name: MINIO_ROOT_PASSWORD
              value: "vexa-secret-key"
