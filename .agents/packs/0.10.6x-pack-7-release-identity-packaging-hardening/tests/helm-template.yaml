# Source: vexa/templates/statefulset-postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pack7-vexa-postgres
  labels:
    app.kubernetes.io/name: vexa
    app.kubernetes.io/instance: pack7
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: vexa-0.10.6_2.1
spec:
  serviceName: pack7-vexa-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vexa
      app.kubernetes.io/instance: pack7
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vexa
        app.kubernetes.io/instance: pack7
        app.kubernetes.io/component: postgres
    spec:
      # v0.10.5 Pack I.s — stateful-pod anti-affinity (#272 iter-5).
      # See deployment-minio.yaml header for the full rationale. Symmetric
      # spread across postgres/redis/minio/tts-service so that on a 2+
      # node cluster they distribute and avoid Linode's 7-vol-per-instance
      # cap during chart-upgrade rolling restarts (which retains old PVs
      # under reclaimPolicy=Retain, briefly causing 8+ volumes/node).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [redis, minio, tts-service]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: postgres
          image: "postgres:17-alpine"
          imagePullPolicy: IfNotPresent
          # idle_in_transaction_session_timeout=60s auto-kills orphaned
          # transactions (defense-in-depth against DB session leaks in meeting-api).
          args:
            - "-c"
            - "idle_in_transaction_session_timeout=60000"
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          envFrom:
            - secretRef:
                name: "postgres-credentials"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432 -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432 -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: 4000m
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
