      app.kubernetes.io/instance: pack7
      app.kubernetes.io/component: admin-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vexa
        app.kubernetes.io/instance: pack7
        app.kubernetes.io/component: admin-api
      annotations:
        {}
    spec:
      securityContext:
        {}
      containers:
        - name: admin-api
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          image: "vexaai/admin-api:0.10.6.2.1"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: DB_HOST
              value: "pack7-vexa-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: "postgres-credentials"
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "postgres-credentials"
                  key: POSTGRES_USER
            - name: DB_SSL_MODE
              value: "disable"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "postgres-credentials"
                  key: POSTGRES_PASSWORD
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pack7-vexa-secrets
                  key: ADMIN_API_TOKEN
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: pack7-vexa-secrets
                  key: INTERNAL_API_SECRET
            - name: DB_POOL_SIZE
              value: "10"
            - name: DB_MAX_OVERFLOW
              value: "5"
            - name: DB_POOL_TIMEOUT
              value: "10"
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
